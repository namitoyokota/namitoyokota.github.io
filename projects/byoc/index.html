<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BYOC Interactive Prototype</title>
    <style>
      :root {
        --background: #fffcf2;
        --foreground: #252422;
        --card: #fffcf2;
        --primary: #eb5e28;
        --primary-foreground: #fffcf2;
        --soft-gray: #e3ded5;
        --mist-gray: #f1ede6;
        --muted: #f1ede6;
        --muted-foreground: #403d39;
        --accent: #eb5e28;
        --destructive: #252422;
        --border: #e3ded5;
        --input: #ccc5b9;
        --sidebar: #252422;
        --sidebar-active: #ccc5b9;
        --radius: 8px;
        --shadow: 0 18px 55px rgba(37, 36, 34, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--foreground);
        background: var(--background);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        display: grid;
        grid-template-columns: 232px minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 18px 14px;
        color: #fffcf2;
        background: var(--sidebar);
        border-right: 1px solid #403d39;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 22px;
        font-weight: 800;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        color: #fffcf2;
        background: #403d39;
        border: 1px solid #403d39;
        border-radius: 6px;
      }

      .nav {
        display: grid;
        gap: 4px;
      }

      .nav-section {
        margin: 18px 8px 6px;
        color: #ccc5b9;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .nav button {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        min-height: 38px;
        padding: 8px 10px;
        color: #ccc5b9;
        background: transparent;
        border: 0;
        border-radius: 6px;
        text-align: left;
        font-size: 13px;
      }

      .nav button.active {
        color: #252422;
        background: var(--sidebar-active);
        box-shadow: inset 3px 0 0 #eb5e28;
        font-weight: 800;
      }

      .nav button.primary-link {
        min-height: 44px;
        font-size: 15px;
      }

      .nav svg,
      .button svg,
      .icon-button svg {
        width: 17px;
        height: 17px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex: 0 0 auto;
      }

      .main {
        min-width: 0;
        padding: 24px;
      }

      .mobile-bar {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .page-header,
      .toolbar,
      .row,
      .dialog-header,
      .drawer-header,
      .toast,
      .list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .page-header {
        margin-bottom: 18px;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      .page-title h1 {
        margin: 0;
        font-size: 24px;
      }

      .page-title p {
        margin: 2px 0 0;
        color: var(--muted-foreground);
        font-size: 13px;
      }

      .button,
      .icon-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 36px;
        color: var(--primary-foreground);
        background: var(--primary);
        border: 1px solid var(--primary);
        border-radius: 6px;
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
      }

      .button {
        padding: 7px 12px;
      }

      .icon-button {
        width: 36px;
        padding: 0;
      }

      .button.secondary,
      .icon-button.secondary {
        color: #403d39;
        background: #fffcf2;
        border-color: var(--border);
      }

      .button.secondary:hover,
      .icon-button.secondary:hover {
        border-color: #eb5e28;
      }

      .button.ghost {
        color: #403d39;
        background: transparent;
        border-color: transparent;
      }

      .button.destructive,
      .icon-button.destructive {
        background: var(--destructive);
        border-color: var(--destructive);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .card,
      .panel,
      .toolbar,
      .table-wrap,
      .empty {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .metric,
      .panel {
        padding: 15px;
      }

      .metric span,
      .field span,
      .list-item span,
      .hint {
        color: var(--muted-foreground);
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 25px;
      }

      .metric small {
        display: block;
        margin-top: 4px;
        color: #403d39;
        font-size: 12px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
        gap: 14px;
      }

      .set-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
        gap: 18px;
        align-items: start;
        margin-top: 14px;
      }

      .grid-settings {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .toolbar {
        margin-bottom: 12px;
        padding: 10px;
      }

      .toolbar-left,
      .toolbar-right,
      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .toolbar-split {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .toolbar-filters {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        min-width: 0;
        flex: 1 1 auto;
      }

      .input,
      .select,
      .textarea {
        min-height: 36px;
        padding: 7px 10px;
        color: #252422;
        background: #fffcf2;
        border: 1px solid var(--input);
        border-radius: 6px;
        font-size: 13px;
      }

      .search-input {
        min-width: 280px;
        flex: 1 1 280px;
      }

      .toolbar-search {
        flex: 1 1 280px;
      }

      .text-link {
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        text-align: left;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 2px;
        text-decoration-color: #eb5e28;
      }

      .platform-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .textarea {
        min-height: 84px;
        resize: vertical;
      }

      .table-wrap {
        overflow: auto;
      }

      .expandable-row {
        cursor: pointer;
      }

      .expandable-row:hover td {
        background: #f1ede6;
      }

      .expandable-row[aria-expanded="true"] td {
        background: #fffcf2;
        border-bottom-color: #ccc5b9;
      }

      .nested-row > td {
        padding: 14px;
        background: #ccc5b9;
        border-bottom: 1px solid #ccc5b9;
      }

      .nested-table-wrap {
        overflow: auto;
        border: 1px solid #ccc5b9;
        background: #fffcf2;
        box-shadow: 0 1px 0 rgba(37, 36, 34, 0.08);
      }

      .nested-table {
        min-width: 680px;
        background: #fffcf2;
      }

      .nested-table th {
        color: #fffcf2;
        background: #403d39;
        border-bottom-color: #403d39;
      }

      .nested-table td {
        background: #fffcf2;
        border-bottom-color: #ccc5b9;
      }

      .action-column {
        width: 1%;
        white-space: nowrap;
        text-align: right;
      }

      .action-column .actions {
        justify-content: flex-end;
      }

      table {
        width: 100%;
        min-width: 880px;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        padding: 10px 9px;
        border-bottom: 1px solid #ccc5b9;
        text-align: left;
        vertical-align: middle;
      }

      th {
        color: #403d39;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .table-wrap > table > thead > tr > th {
        color: #403d39;
        background: #e3ded5;
        border-bottom-color: #eb5e28;
      }

      th button {
        padding: 0;
        color: inherit;
        background: transparent;
        border: 0;
        font: inherit;
        text-transform: inherit;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .card-thumb {
        display: inline-block;
        width: 38px;
        height: 52px;
        overflow: hidden;
        background:
          linear-gradient(140deg, #fffcf2 0%, #ccc5b9 44%, #403d39 100%);
        border: 1px solid #ccc5b9;
        border-radius: 4px;
      }

      .card-thumb img,
      .large-card-art img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .green-card {
        background:
          linear-gradient(140deg, #fffcf2 0%, #ccc5b9 48%, #403d39 100%);
      }

      .amber-card {
        background:
          linear-gradient(140deg, #fffcf2 0%, #ccc5b9 48%, #403d39 100%);
      }

      .blue-card {
        background:
          linear-gradient(140deg, #fffcf2 0%, #ccc5b9 48%, #252422 100%);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 4px 9px;
        color: #403d39;
        background: #fffcf2;
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .green {
        color: #403d39;
        background: #f1ede6;
        border-color: #e3ded5;
      }

      .amber {
        color: #403d39;
        background: #ccc5b9;
        border-color: #ccc5b9;
      }

      .red {
        color: #fffcf2;
        background: #403d39;
        border-color: #403d39;
      }

      .blue {
        color: #403d39;
        background: #f1ede6;
        border-color: #e3ded5;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .list-item {
        padding: 11px;
        background: #f1ede6;
        border: 1px solid #e3ded5;
        border-radius: 7px;
      }

      .list-item strong {
        display: block;
        font-size: 13px;
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 220px;
        padding: 24px;
        text-align: center;
        border-style: dashed;
      }

      .chart {
        height: 210px;
        padding-top: 18px;
      }

      .chart-fill {
        height: 150px;
        border-bottom: 1px solid #ccc5b9;
        background: linear-gradient(
          180deg,
          rgba(73, 80, 87, 0.18),
          rgba(73, 80, 87, 0.02)
        );
        clip-path: polygon(
          0 74%,
          14% 68%,
          31% 63%,
          48% 52%,
          63% 58%,
          79% 35%,
          100% 26%,
          100% 100%,
          0 100%
        );
      }

      .modal-backdrop,
      .drawer-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        background: rgba(37, 36, 34, 0.42);
      }

      .modal-backdrop.open,
      .drawer-backdrop.open {
        display: block;
      }

      .dialog {
        width: min(720px, calc(100vw - 28px));
        max-height: calc(100vh - 44px);
        margin: 22px auto;
        overflow: auto;
        padding: 16px;
        background: #fffcf2;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: min(920px, 100vw);
        height: 100vh;
        overflow: auto;
        padding: 20px;
        background: #fffcf2;
        border-left: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .dialog h2,
      .drawer h2 {
        margin: 0;
        font-size: 20px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .form-row {
        display: grid;
        gap: 5px;
      }

      label {
        color: #403d39;
        font-size: 12px;
        font-weight: 800;
      }

      .dialog-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .drawer-grid {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 18px;
        margin-top: 18px;
      }

      .large-card-art {
        min-height: 350px;
        overflow: hidden;
        background:
          linear-gradient(160deg, #fffcf2 0%, #ccc5b9 38%, #403d39 100%);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .field {
        padding: 10px;
        background: #f1ede6;
        border: 1px solid #e3ded5;
        border-radius: 6px;
      }

      .field strong {
        display: block;
        margin-top: 3px;
        font-size: 13px;
      }

      .toast-region {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 50;
        display: grid;
        gap: 8px;
        width: min(360px, calc(100vw - 36px));
      }

      .toast {
        align-items: flex-start;
        padding: 11px 12px;
        background: #fffcf2;
        border: 1px solid var(--border);
        border-left: 4px solid var(--primary);
        border-radius: 7px;
        box-shadow: 0 10px 35px rgba(37, 36, 34, 0.12);
      }

      .toast strong,
      .toast span {
        display: block;
      }

      .auth {
        display: grid;
        grid-template-columns: minmax(320px, 0.8fr) minmax(0, 1.2fr);
        min-height: 100vh;
        background: #fffcf2;
      }

      .auth-form {
        align-self: center;
        width: min(380px, calc(100vw - 36px));
        margin: 0 auto;
        padding: 28px;
      }

      .auth-form h1 {
        margin-bottom: 8px;
      }

      .auth-visual {
        display: grid;
        align-content: center;
        gap: 18px;
        padding: 42px;
        background: #ccc5b9;
        border-left: 1px solid var(--border);
      }

      .visual-cards {
        display: grid;
        grid-template-columns: repeat(3, 96px);
        gap: 12px;
      }

      .visual-cards .card-thumb {
        width: 96px;
        height: 132px;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 1050px) {
        .app,
        .grid-2,
        .drawer-grid {
          grid-template-columns: 1fr;
        }

        .sidebar {
          display: none;
        }

        .mobile-bar {
          display: flex;
        }

        .metrics,
        .grid-settings {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .main {
          padding: 16px;
        }

        .page-header,
        .toolbar,
        .toolbar-left,
        .toolbar-right,
        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .metrics,
        .form-grid,
        .field-grid,
        .grid-settings,
        .auth {
          grid-template-columns: 1fr;
        }

        .search-input,
        .button,
        .select {
          width: 100%;
        }

        .auth-visual {
          border-left: 0;
          border-top: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal" class="modal-backdrop"></div>
    <div id="drawer" class="drawer-backdrop"></div>
    <div id="toasts" class="toast-region" aria-live="polite"></div>

    <script>
      const icons = {
        collection:
          '<svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"></rect><path d="M8 7h8M8 11h8M8 15h5"></path></svg>',
        players:
          '<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"></circle><path d="M4 21c1.7-4 4.4-6 8-6s6.3 2 8 6"></path></svg>',
        sets:
          '<svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"></path><path d="M3 6h.01M3 12h.01M3 18h.01"></path></svg>',
        settings:
          '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.1 2.1-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21h-3v-.8a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1-2.1-2.1.1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.5-1H3v-3h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1 2.1-2.1.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.5V3h3v.8a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1 2.1 2.1-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.5 1h.5v3h-.5a1.7 1.7 0 0 0-1.5 1z"></path></svg>',
        plus:
          '<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>',
        edit:
          '<svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>',
        trash:
          '<svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15"></path></svg>',
        eye:
          '<svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>',
        x:
          '<svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"></path></svg>',
        menu:
          '<svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>',
        check:
          '<svg viewBox="0 0 24 24"><path d="m20 6-11 11-5-5"></path></svg>',
        download:
          '<svg viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>',
      };

      const searchPlatforms = [
        { id: "ebay", label: "eBay", build: (q) => `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(q)}` },
        { id: "goldin", label: "Goldin", build: (q) => `https://goldin.co/search?q=${encodeURIComponent(q)}` },
        { id: "fanatics", label: "Fanatics Collect", build: (q) => `https://www.fanaticscollect.com/search?q=${encodeURIComponent(q)}` },
        { id: "alt", label: "Alt", build: (q) => `https://www.alt.xyz/search?q=${encodeURIComponent(q)}` },
        { id: "yahoo", label: "Yahoo Auctions Japan", build: (q) => `https://auctions.yahoo.co.jp/search/search?p=${encodeURIComponent(q)}` },
        { id: "mercari", label: "Mercari Japan", build: (q) => `https://jp.mercari.com/search?keyword=${encodeURIComponent(q)}` },
        { id: "comc", label: "COMC", build: (q) => `https://www.comc.com/Cards,sr,=${encodeURIComponent(q)}` },
      ];

      const buildDefaultComps = () => {
        const cards = [
          { collectionId: 1, shortName: "Yoshida Anime", query: "Masataka Yoshida 2024 Bowman Baseball Anime", maxPrice: 60, minGrade: "", lastChecked: "2026-06-11" },
          { collectionId: 2, shortName: "Imanaga BBM rookie", query: "Shota Imanaga 2016 BBM Rookie Edition Base Rookie 88 PSA 10", maxPrice: 175, minGrade: "PSA 10", lastChecked: "2026-06-07" },
          { collectionId: 3, shortName: "Suzuki Rayfoil", query: "Seiya Suzuki 2021 Topps NPB Rayfoil 1/1", maxPrice: "", minGrade: "", lastChecked: "2026-06-19" },
        ];
        let id = 0;
        return cards.flatMap((card) =>
          searchPlatforms.map((platform) => ({
            id: ++id,
            collectionId: card.collectionId,
            name: `${card.shortName} on ${platform.label}`,
            marketplace: platform.label,
            query: card.query,
            url: platform.build(card.query),
            maxPrice: card.maxPrice,
            minGrade: card.minGrade,
            active: true,
            lastChecked: card.lastChecked,
          })),
        );
      };

      const state = {
        route: "collection",
        authed: true,
        mobileNav: false,
        searchTarget: null,
        setExpanded: [],
        collectionExpanded: [],
        pendingSetId: null,
        pendingCollectionId: null,
        collectionSearch: "",
        collectionStatus: "All",
        collectionPlayer: "All",
        collectionSet: "All",
        collectionVariation: "All",
        collectionCondition: "All",
        collectionSource: "All",
        collectionGrade: "All",
        collectionSort: "player",
        collectionSortDir: "asc",

      const playerById = (id) => state.players.find((p) => p.id == id) || {};

      const variationById = (id) => state.variations.find((v) => v.id == id) || {};
      const cardTitle = (item) => {
        const p = playerById(item.playerId);
        const s = setById(item.setId);
        const v = variationById(item.variationId);
        return [p.name, s.year, s.brand, s.series, v.name, item.cardNumber].filter(Boolean).join(" ");

      const collectionSearchQuery = (item) => {
        if (!item) return "";
        const grade = item.condition === "Graded" ? `${item.grader} ${item.grade}` : "";
        return item.searchQuery || [cardTitle(item), item.serial, grade].filter(Boolean).join(" ");
      };
      const variationSearchQuery = (variation) => {
        if (!variation) return "";
        const s = setById(variation.setId);
        return variation.compQuery || [s.year, s.brand, s.series, variation.name, variation.printRun].filter(Boolean).join(" ");

        const platform = searchPlatforms.find((item) => item.id === platformId) || searchPlatforms[0];

      };

        state.searchTarget = { kind, id };

        renderModal();

        const target = state.searchTarget;
        if (!target) return;
        const query = target.kind === "variation" ? variationSearchQuery(variationById(target.id)) : collectionSearchQuery(state.collection.find((item) => item.id == target.id));

        window.open(url, "_blank", "noopener,noreferrer");
        closeModal();

      const openCompQuery = (id) => {
        const comp = state.comps.find((item) => item.id === id);
        if (!comp) return;
        const platform = searchPlatforms.find((item) => item.label === comp.marketplace);
        window.open(comp.url || (platform ? platform.build(comp.query) : platformUrl("ebay", comp.query)), "_blank", "noopener,noreferrer");
      };
      const daysAgo = (date) => {
        if (!date) return "Never";
        const diff = Math.max(0, Math.round((new Date("2026-06-20") - new Date(date)) / 86400000));
        if (diff === 0) return "Today";
        if (diff === 1) return "Yesterday";
        return diff + " days";
      };
      const escapeHtml = (value) =>
        String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      const uniqueOptions = (rows, getter) =>
        Array.from(new Set(rows.map(getter).filter((value) => value !== "" && value != null))).sort();
      const selectMarkup = (options, selected) =>
        options
          .map((option) => {
            const value = typeof option === "string" ? option : option.value;
            const label = typeof option === "string" ? option : option.label;
            return `<option value="${escapeHtml(value)}" ${String(selected) === String(value) ? "selected" : ""}>${escapeHtml(label)}</option>`;
          })
          .join("");
      const allOptions = (label, rows, getter) => [
        { value: "All", label },
        ...uniqueOptions(rows, getter).map((value) => ({ value, label: value })),
      ];
      const direction = (current, field, dir) => (current === field ? (dir === "asc" ? "desc" : "asc") : "asc");
      const compareValues = (a, b, dir = "asc") => {
        const left = typeof a === "number" ? a : String(a ?? "").toLowerCase();
        const right = typeof b === "number" ? b : String(b ?? "").toLowerCase();
        if (left < right) return dir === "asc" ? -1 : 1;
        if (left > right) return dir === "asc" ? 1 : -1;
        return 0;

        node.innerHTML = `<div><strong>${escapeHtml(title)}</strong><span>${escapeHtml(message)}</span></div>`;
        $("toasts").appendChild(node);
        setTimeout(() => node.remove(), 3200);

      function filteredCollection() {
        const q = state.collectionSearch.toLowerCase();
        return state.collection
          .filter((item) => {
            const player = playerById(item.playerId).name;
            const set = `${setById(item.setId).year} ${setById(item.setId).brand} ${setById(item.setId).series}`;

            const grade = item.condition === "Graded" ? `${item.grader} ${item.grade}` : "Raw";
            const haystack = [cardTitle(item), item.status, item.source, item.condition, grade].join(" ").toLowerCase();
            return (!q || haystack.includes(q)) &&
              (state.collectionPlayer === "All" || player === state.collectionPlayer) &&
              (state.collectionSet === "All" || set === state.collectionSet) &&
              (state.collectionVariation === "All" || variation === state.collectionVariation) &&
              (state.collectionStatus === "All" || item.status === state.collectionStatus) &&
              (state.collectionCondition === "All" || item.condition === state.collectionCondition) &&
              (state.collectionSource === "All" || item.source === state.collectionSource) &&
              (state.collectionGrade === "All" || grade === state.collectionGrade);
          })
          .sort((a, b) => {
            const get = (item) => {
              const s = setById(item.setId);
              if (state.collectionSort === "player") return playerById(item.playerId).name;

              if (state.collectionSort === "serial") return item.serial;

              if (state.collectionSort === "comp") return Number(item.latestValue || 0);
              if (state.collectionSort === "status") return item.status;
              if (state.collectionSort === "source") return item.source;
              return playerById(item.playerId).name;
            };
            return compareValues(get(a), get(b), state.collectionSortDir);
          });
      }

                  const expanded = state.setExpanded.includes(s.id);
                  return `
                    <tr class="expandable-row" tabindex="0" aria-expanded="${expanded}" onclick="toggleSet(${s.id})" onkeydown="if(event.target===event.currentTarget&&(event.key==='Enter'||event.key===' ')){event.preventDefault();toggleSet(${s.id})}">
                      <td>${s.year}</td>
                      <td>${escapeHtml(s.brand)}</td>
                      <td>${escapeHtml(s.series)}</td>
                      <td>${variations.length}</td>
                      <td class="action-column"><div class="actions"><button class="icon-button secondary" title="Edit set" onclick="event.stopPropagation();openModal('set', ${s.id})">${icons.edit}</button><button class="icon-button destructive" title="Delete set" onclick="event.stopPropagation();deleteSet(${s.id})">${icons.trash}</button></div></td>
                    </tr>
                    ${expanded ? `<tr class="nested-row"><td colspan="5"><div class="nested-table-wrap"><table class="nested-table"><thead><tr><th>Name</th><th>Type</th><th>Rarity</th><th>Print Run</th><th>Comp Query</th><th class="action-column">Actions</th></tr></thead><tbody>${variations.length ? variations.map((v) => `<tr><td>${escapeHtml(v.name)}</td><td>${escapeHtml(v.type)}</td><td>${escapeHtml(v.rarity || "-")}</td><td>${escapeHtml(v.printRun || "-")}</td><td>${v.compQuery ? `<button class="text-link" onclick="event.stopPropagation();openSearchDialog('variation', ${v.id})">${escapeHtml(v.compQuery)}</button>` : "-"}</td><td class="action-column"><div class="actions"><button class="icon-button secondary" title="Edit variation" onclick="event.stopPropagation();state.pendingSetId=${s.id};openModal('variation', ${v.id})">${icons.edit}</button><button class="icon-button destructive" title="Delete variation" onclick="event.stopPropagation();deleteVariation(${v.id})">${icons.trash}</button></div></td></tr>`).join("") : `<tr><td colspan="6"><span class="hint">No variations yet.</span></td></tr>`}</tbody></table></div></td></tr>` : ""}
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>`;
      }

      function toggleSet(id) {
        state.setExpanded = state.setExpanded.includes(id)
          ? state.setExpanded.filter((setId) => setId !== id)
          : [...state.setExpanded, id];
        render();
      }

      function sortSet(field) {
        state.setSortDir = direction(state.setSort, field, state.setSortDir);
        state.setSort = field;
        render();
      }

      function settingsPage() {
        return `
          ${pageHeader("Settings", "Profile, export, and prototype controls.", `<button class="button" onclick="toast('Settings saved', 'Prototype preferences updated.')">${icons.check}Save Changes</button>`)}
          <div class="grid-settings">
            <section class="panel"><h2>Profile</h2><div class="form-row"><label>Collection name</label><input class="input" value="My Collection" /></div><div class="form-row" style="margin-top:10px"><label>Email</label><input class="input" value="nami@example.com" /></div></section>
            <section class="panel"><h2>Preferences</h2><div class="list"><div class="list-item"><div><strong>Show stale search badges</strong><span>Highlight active searches after 7 days.</span></div><span class="pill green">On</span></div><div class="list-item"><div><strong>Prefer median valuation</strong><span>Collection comp values use the latest median.</span></div><span class="pill green">On</span></div></div></section>
            <section class="panel"><h2>Data</h2><div class="list"><div class="list-item"><div><strong>Collection CSV</strong><span>Export current in-memory rows.</span></div><button class="button secondary" onclick="exportCollection()">${icons.download}Export</button></div><div class="list-item"><div><strong>Reset seed data</strong><span>Reloads the prototype file.</span></div><button class="button secondary" onclick="location.reload()">Reset</button></div></div></section>
            <section class="panel"><h2>Account</h2><div class="list"><div class="list-item"><div><strong>Prototype auth</strong><span>No backend session is created.</span></div><button class="button destructive" onclick="state.authed=false; render()">Sign out</button></div></div></section>
          </div>`;
      }

      function authView() {
        return `
          <div class="auth">
            <div class="auth-form">
              <div class="brand"><span class="brand-mark">B</span><span>BYOC</span></div>
              <h1>Log in</h1>
              <p class="hint">Access your private collection workspace.</p>
              <div class="form-row"><label>Email</label><input class="input" value="nami@example.com" /></div>
              <div class="form-row" style="margin-top:10px"><label>Password</label><input class="input" type="password" value="password" /></div>
              <button class="button" style="width:100%;margin-top:14px" onclick="state.authed=true; state.route='collection'; render(); toast('Signed in', 'Prototype session started.')">Log in</button>
              <button class="button ghost" style="width:100%;margin-top:6px" onclick="state.authed=true; state.route='collection'; render(); toast('Account created', 'Prototype profile is ready.')">Create account</button>
            </div>
            <div class="auth-visual">
              <div class="visual-cards"><span class="card-thumb green-card"></span><span class="card-thumb amber-card"></span><span class="card-thumb blue-card"></span></div>
              <div><h2>Cards, searches, values, and storage in one place.</h2><p class="hint">This is an in-memory prototype. Changes last until the page reloads.</p></div>
            </div>
          </div>`;
      }

      function emptyState(text, action, handler) {
        return `<div class="empty"><div><strong>${escapeHtml(text)}</strong><br /><button class="button" style="margin-top:12px" onclick="${handler}">${icons.plus}${action}</button></div></div>`;
      }

      function openModal(type, id = null) {
        state.modal = type;
        state.editing = id;
        renderModal();
      }

      function closeModal() {
        state.modal = null;
        state.editing = null;
        state.searchTarget = null;
        state.pendingSetId = null;
        state.pendingCollectionId = null;
        renderModal();
      }

      function renderModal() {
        const modal = $("modal");
        if (!state.modal) {
          modal.className = "modal-backdrop";
          modal.innerHTML = "";
          return;
        }
        modal.className = "modal-backdrop open";
        modal.innerHTML = modalBody();
      }

      function modalBody() {
        if (state.modal === "platform") return platformForm();
        if (state.modal === "comp") return compForm();
        if (state.modal === "player") return playerForm();
        if (state.modal === "set") return setForm();
        if (state.modal === "variation") return variationForm();
        if (state.modal === "valuation") return valuationForm();
        return collectionForm();
      }

      function collectionForm() {
        const item = state.collection.find((i) => i.id == state.editing) || {};
        return `
          <form class="dialog" onsubmit="saveCollection(event)">
            <div class="dialog-header"><h2>${item.id ? "Edit Card" : "Add Card"}</h2><button type="button" class="icon-button secondary" onclick="closeModal()">${icons.x}</button></div>
            <div class="form-grid">
              ${selectField("playerId", "Player", state.players, item.playerId, "name")}
              ${selectField("setId", "Set", state.sets.map((s) => ({ ...s, label: `${s.year} ${s.brand} ${s.series}` })), item.setId, "label")}
              ${selectField("variationId", "Variation", state.variations, item.variationId, "name")}
              <div class="form-row"><label>Status</label><select class="select" name="status">${["Owned", "Incoming", "Sold", "Watching"].map((v) => `<option ${item.status === v ? "selected" : ""}>${v}</option>`).join("")}</select></div>
              <div class="form-row"><label>Card number</label><input class="input" name="cardNumber" value="${escapeHtml(item.cardNumber || "")}" /></div>
              <div class="form-row"><label>Serial number</label><input class="input" name="serial" value="${escapeHtml(item.serial || "")}" /></div>
              <div class="form-row"><label>Condition</label><select class="select" name="condition">${["Raw", "Graded"].map((v) => `<option ${item.condition === v ? "selected" : ""}>${v}</option>`).join("")}</select></div>
              <div class="form-row"><label>Grader</label><input class="input" name="grader" value="${escapeHtml(item.grader || "")}" /></div>
              <div class="form-row"><label>Grade</label><input class="input" name="grade" value="${escapeHtml(item.grade || "")}" /></div>
              <div class="form-row"><label>Purchase price</label><input class="input" name="purchasePrice" type="number" step="0.01" value="${item.purchasePrice ?? ""}" /></div>
              <div class="form-row"><label>Comp</label><input class="input" name="latestValue" type="number" step="0.01" value="${item.latestValue ?? ""}" /></div>
              <div class="form-row"><label>Source</label><input class="input" name="source" value="${escapeHtml(item.source || "")}" /></div>
            </div>
            <div class="dialog-footer"><button type="button" class="button secondary" onclick="closeModal()">Cancel</button><button class="button">${icons.check}Save Card</button></div>
          </form>`;
      }

      function platformForm() {
        const target = state.searchTarget;
        const item = target?.kind === "variation" ? variationById(target.id) : state.collection.find((row) => row.id == target?.id);
        const query = target?.kind === "variation" ? variationSearchQuery(item) : collectionSearchQuery(item);
        return `
          <div class="dialog">
            <div class="dialog-header"><h2>Choose Search Platform</h2><button type="button" class="icon-button secondary" onclick="closeModal()">${icons.x}</button></div>
            <div class="form-row"><label>Query</label><input class="input" value="${escapeHtml(query)}" readonly /></div>
            <div class="platform-grid" style="margin-top:12px">
              ${searchPlatforms.map((platform, index) => `<button type="button" class="button ${index === 0 ? "" : "secondary"}" onclick="launchSearch('${platform.id}')">${escapeHtml(platform.label)}</button>`).join("")}
            </div>
          </div>`;
      }

      function compForm() {
        const search = state.comps.find((s) => s.id == state.editing) || {};
        const selectedCollectionId = search.id ? search.collectionId : (state.pendingCollectionId || "");
        return `
          <form class="dialog" onsubmit="saveComp(event)">
            <div class="dialog-header"><h2>${search.id ? "Edit Comp Query" : "Add Comp Query"}</h2><button type="button" class="icon-button secondary" onclick="closeModal()">${icons.x}</button></div>
            <div class="form-grid">
              ${selectField("collectionId", "Collection row", state.collection.map((c) => ({ id: c.id, label: cardTitle(c) })), selectedCollectionId, "label")}
              <div class="form-row"><label>Marketplace</label><select class="select" name="marketplace">${[...searchPlatforms.map((platform) => platform.label), "Other"].map((v) => `<option ${search.marketplace === v ? "selected" : ""}>${v}</option>`).join("")}</select></div>
              <div class="form-row"><label>Name</label><input class="input" name="name" value="${escapeHtml(search.name || "")}" required /></div>
              <div class="form-row"><label>Max price</label><input class="input" name="maxPrice" type="number" step="0.01" value="${search.maxPrice ?? ""}" /></div>
              <div class="form-row"><label>Minimum grade</label><input class="input" name="minGrade" value="${escapeHtml(search.minGrade || "")}" /></div>
              <div class="form-row"><label>Active</label><select class="select" name="active"><option value="true" ${search.active !== false ? "selected" : ""}>Active</option><option value="false" ${search.active === false ? "selected" : ""}>Inactive</option></select></div>
            </div>
            <div class="form-row" style="margin-top:10px"><label>Query</label><input class="input" name="query" value="${escapeHtml(search.query || "")}" /></div>
            <div class="form-row" style="margin-top:10px"><label>URL</label><textarea class="textarea" name="url">${escapeHtml(search.url || "")}</textarea></div>
            <div class="dialog-footer"><button type="button" class="button secondary" onclick="closeModal()">Cancel</button><button class="button">${icons.check}Save Comp Query</button></div>
          </form>`;
      }

      function playerForm() {
        const player = state.players.find((p) => p.id == state.editing) || {};
        return `
          <form class="dialog" onsubmit="savePlayer(event)">
            <div class="dialog-header"><h2>${player.id ? "Edit Player" : "Add Player"}</h2><button type="button" class="icon-button secondary" onclick="closeModal()">${icons.x}</button></div>
            <div class="form-grid">
              <div class="form-row"><label>Name</label><input class="input" name="name" value="${escapeHtml(player.name || "")}" required /></div>
              <div class="form-row"><label>Team</label><input class="input" name="team" value="${escapeHtml(player.team || "")}" /></div>
              <div class="form-row"><label>Sport</label><input class="input" name="sport" value="${escapeHtml(player.sport || "Baseball")}" required /></div>
              <div class="form-row"><label>League</label><input class="input" name="league" value="${escapeHtml(player.league || "MLB")}" required /></div>
            </div>
            <div class="dialog-footer"><button type="button" class="button secondary" onclick="closeModal()">Cancel</button><button class="button">${icons.check}Save Player</button></div>
          </form>`;
      }

      function setForm() {
        const set = state.sets.find((s) => s.id == state.editing) || {};
        return `
          <form class="dialog" onsubmit="saveSet(event)">
            <div class="dialog-header"><h2>${set.id ? "Edit Set" : "Add Set"}</h2><button type="button" class="icon-button secondary" onclick="closeModal()">${icons.x}</button></div>
            <div class="form-grid">
              <div class="form-row"><label>Year</label><input class="input" name="year" type="number" value="${set.year || ""}" required /></div>
              <div class="form-row"><label>Brand</label><input class="input" name="brand" value="${escapeHtml(set.brand || "")}" required /></div>
              <div class="form-row"><label>Series</label><input class="input" name="series" value="${escapeHtml(set.series || "")}" required /></div>
            </div>
            <div class="dialog-footer"><button type="button" class="button secondary" onclick="closeModal()">Cancel</button><button class="button">${icons.check}Save Set</button></div>
          </form>`;
      }

      function variationForm() {
        const variation = state.variations.find((v) => v.id == state.editing) || {};
        const selectedSetId = variation.id ? variation.setId : (state.pendingSetId || "");
        return `
          <form class="dialog" onsubmit="saveVariation(event)">
            <div class="dialog-header"><h2>${variation.id ? "Edit Variation" : "Add Variation"}</h2><button type="button" class="icon-button secondary" onclick="closeModal()">${icons.x}</button></div>
            <div class="form-grid">
              ${selectField("setId", "Set", state.sets.map((s) => ({ ...s, label: `${s.year} ${s.brand} ${s.series}` })), selectedSetId, "label")}
              <div class="form-row"><label>Name</label><input class="input" name="name" value="${escapeHtml(variation.name || "")}" required /></div>
              <div class="form-row"><label>Type</label><select class="select" name="type">${["Base", "Parallel", "Insert", "Autograph", "Relic", "Auto-Relic", "Printing Plate", "Buyback", "Other"].map((v) => `<option ${variation.type === v ? "selected" : ""}>${v}</option>`).join("")}</select></div>
              <div class="form-row"><label>Rarity</label><input class="input" name="rarity" value="${escapeHtml(variation.rarity || "")}" /></div>
              <div class="form-row"><label>Print run</label><input class="input" name="printRun" value="${escapeHtml(variation.printRun || "")}" /></div>
              <div class="form-row"><label>Comp query</label><input class="input" name="compQuery" value="${escapeHtml(variation.compQuery || "")}" placeholder="Optional" /></div>
            </div>
            <div class="dialog-footer"><button type="button" class="button secondary" onclick="closeModal()">Cancel</button><button class="button">${icons.check}Save Variation</button></div>
          </form>`;
      }

      function valuationForm() {
        return `
          <form class="dialog" onsubmit="saveValuation(event)">
            <div class="dialog-header"><h2>Add Manual Valuation</h2><button type="button" class="icon-button secondary" onclick="closeModal()">${icons.x}</button></div>
            <div class="form-grid">
              <div class="form-row"><label>Provider</label><input class="input" name="provider" value="Manual" /></div>
              <div class="form-row"><label>Recorded at</label><input class="input" name="recordedAt" type="date" value="2026-06-20" /></div>
              <div class="form-row"><label>Market low</label><input class="input" name="low" type="number" step="0.01" /></div>
              <div class="form-row"><label>Market median</label><input class="input" name="median" type="number" step="0.01" required /></div>
              <div class="form-row"><label>Market high</label><input class="input" name="high" type="number" step="0.01" /></div>
              <div class="form-row"><label>Most recent sale</label><input class="input" name="recent" type="number" step="0.01" /></div>
            </div>
            <div class="dialog-footer"><button type="button" class="button secondary" onclick="closeModal()">Cancel</button><button class="button">${icons.check}Save Valuation</button></div>
          </form>`;
      }

      function selectField(name, label, rows, value, labelKey) {
        return `<div class="form-row"><label>${label}</label><select class="select" name="${name}">${rows.map((row) => `<option value="${row.id}" ${row.id == value ? "selected" : ""}>${escapeHtml(row[labelKey])}</option>`).join("")}</select></div>`;
      }

      function formData(event) {
        event.preventDefault();
        return Object.fromEntries(new FormData(event.target).entries());
      }

      function saveCollection(event) {
        const data = formData(event);
        const payload = {
          playerId: Number(data.playerId),
          setId: Number(data.setId),
          variationId: Number(data.variationId),
          cardNumber: data.cardNumber,
          serial: data.serial,
          condition: data.condition,
          grader: data.grader,
          grade: data.grade,
          purchasePrice: Number(data.purchasePrice || 0),
          latestValue: Number(data.latestValue || 0),
          source: data.source,
          status: data.status,
          color: ["green-card", "amber-card", "blue-card"][state.collection.length % 3],
        };
        if (state.editing) Object.assign(state.collection.find((i) => i.id == state.editing), payload);
        else state.collection.push({ id: nextId(), purchaseDate: "2026-06-20", ...payload });
        closeModal();
        render();
        toast("Collection saved", "Collection table updated.");
      }

      function saveComp(event) {
        const data = formData(event);
        const platform = searchPlatforms.find((item) => item.label === data.marketplace);
        if (!data.url && platform) data.url = platform.build(data.query || data.name);
        const payload = { collectionId: Number(data.collectionId), name: data.name, marketplace: data.marketplace, query: data.query, url: data.url, maxPrice: data.maxPrice, minGrade: data.minGrade, active: data.active === "true" };
        if (state.editing) Object.assign(state.comps.find((s) => s.id == state.editing), payload);
        else state.comps.push({ id: nextId(), lastChecked: "", ...payload });
        closeModal();
        render();
        toast("Comp query saved", "Comp list updated.");
      }

      function savePlayer(event) {
        const data = formData(event);
        if (state.editing) Object.assign(state.players.find((p) => p.id == state.editing), data);
        else state.players.push({ id: nextId(), ...data });
        closeModal();
        render();
        toast("Player saved", "Player library updated.");
      }

      function saveSet(event) {
        const data = formData(event);
        data.year = Number(data.year);
        if (state.editing) Object.assign(state.sets.find((s) => s.id == state.editing), data);
        else state.sets.push({ id: nextId(), ...data });
        closeModal();
        render();
        toast("Set saved", "Set library updated.");
      }

      function saveVariation(event) {
        const data = formData(event);
        const payload = { setId: Number(data.setId), name: data.name, type: data.type, rarity: data.rarity, printRun: data.printRun, compQuery: data.compQuery };
        if (state.editing) Object.assign(state.variations.find((v) => v.id == state.editing), payload);
        else state.variations.push({ id: nextId(), ...payload });
        closeModal();
        render();
        toast("Variation saved", "Variation list updated.");
      }

      function saveValuation(event) {
        const data = formData(event);
        const item = state.collection.find((i) => i.id == state.drawer);
        state.valuations.push({ id: nextId(), collectionId: item.id, provider: data.provider, median: Number(data.median), low: Number(data.low || 0), high: Number(data.high || 0), recent: Number(data.recent || 0), recordedAt: data.recordedAt });
        item.latestValue = Number(data.median);
        closeModal();
        render();
        toast("Valuation added", "Comp updated on the collection item.");
      }

      function deleteCollection(id) {
        if (!confirm("Delete this collection item?")) return;
        state.collection = state.collection.filter((i) => i.id !== id);
        state.comps = state.comps.filter((comp) => comp.collectionId !== id);
        state.collectionExpanded = state.collectionExpanded.filter((itemId) => itemId !== id);
        render();
        toast("Collection item deleted", "The row and its comp queries were removed.", "danger");
      }

      function deleteSearch(id) {
        if (!confirm("Delete this saved search?")) return;
        state.comps = state.comps.filter((s) => s.id !== id);
        render();
        toast("Search deleted", "The saved marketplace URL was removed.", "danger");
      }

      function deletePlayer(id) {
        if (state.collection.some((i) => i.playerId == id)) return toast("Delete blocked", "This player is referenced by collection rows.", "danger");
        state.players = state.players.filter((p) => p.id !== id);
        render();
      }

      function deleteSet(id) {
        if (state.collection.some((i) => i.setId == id)) return toast("Delete blocked", "This set is referenced by collection rows.", "danger");
        state.sets = state.sets.filter((s) => s.id !== id);
        state.variations = state.variations.filter((v) => v.setId !== id);
        state.setExpanded = state.setExpanded.filter((setId) => setId !== id);
        render();
      }

      function deleteVariation(id) {
        if (state.collection.some((i) => i.variationId == id)) return toast("Delete blocked", "This variation is referenced by collection rows.", "danger");
        state.variations = state.variations.filter((v) => v.id !== id);
        render();
      }

      function markCompChecked(id) {
        const s = state.comps.find((row) => row.id === id);
        s.lastChecked = "2026-06-20";
        render();
        toast("Comp query checked", s.name);
      }

      function openDrawer(id) {
        state.drawer = id;
        renderDrawer();
      }

      function closeDrawer() {
        state.drawer = null;
        renderDrawer();
      }

      function renderDrawer() {
        const node = $("drawer");
        if (!state.drawer) {
          node.className = "drawer-backdrop";
          node.innerHTML = "";
          return;
        }
        const item = state.collection.find((i) => i.id == state.drawer);
        const vals = state.valuations.filter((v) => v.collectionId == item.id).sort((a, b) => b.recordedAt.localeCompare(a.recordedAt));
        const variation = state.variations.find((v) => v.id == item.variationId);
        node.className = "drawer-backdrop open";
        node.innerHTML = `
          <aside class="drawer">
            <div class="drawer-header"><h2>${escapeHtml(cardTitle(item))}</h2><button class="icon-button secondary" onclick="closeDrawer()">${icons.x}</button></div>
            <div class="drawer-grid">
              <div><div class="large-card-art ${item.color || ""}">${item.image ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(cardTitle(item))}" />` : ""}</div><button class="button secondary" style="width:100%;margin-top:10px" onclick="toast('Image selected', 'Prototype keeps image paths in memory only.')">${icons.plus}Upload Image</button></div>
              <div>
                  <div class="field-grid">
                  <div class="field"><span>Status</span><strong>${escapeHtml(item.status)}</strong></div>
                  <div class="field"><span>Cost</span><strong>${money(item.purchasePrice)}</strong></div>
                  <div class="field"><span>Comp</span><strong>${money(item.latestValue)}</strong></div>
                  <div class="field"><span>Condition</span><strong>${item.condition === "Graded" ? `${escapeHtml(item.grader)} ${escapeHtml(item.grade)}` : "Raw"}</strong></div>
                  <div class="field"><span>Source</span><strong>${escapeHtml(item.source)}</strong></div>
                </div>
                <section class="panel"><div class="row"><h2>Search Platforms</h2><button class="button secondary" onclick="openSearchDialog('collection', ${item.id})">${icons.plus}Open</button></div><div class="hint">Choose eBay by default or switch platforms for the same query.</div>${variation && variation.compQuery ? `<div class="hint" style="margin-top:10px">Variation comp query: ${escapeHtml(variation.compQuery)}</div>` : ""}</section>
                <section class="panel" style="margin-top:14px"><div class="row"><h2>Valuation History</h2><button class="button secondary" onclick="openModal('valuation')">${icons.plus}Add</button></div><div class="table-wrap"><table><thead><tr><th>Provider</th><th>Median</th><th>Low</th><th>High</th><th>Recorded</th></tr></thead><tbody>${vals.map((v) => `<tr><td>${escapeHtml(v.provider)}</td><td>${money(v.median)}</td><td>${money(v.low)}</td><td>${money(v.high)}</td><td>${escapeHtml(v.recordedAt)}</td></tr>`).join("")}</tbody></table></div></section>
              </div>
            </div>
          </aside>`;
      }

      function exportCollection() {
        const headers = ["Player", "Set", "Variation", "Serial", "Condition", "Grade", "Purchase Price", "Comp", "Status", "Source"];
        const rows = state.collection.map((i) => [playerById(i.playerId).name, `${setById(i.setId).year} ${setById(i.setId).brand} ${setById(i.setId).series}`, variationById(i.variationId).name, i.serial, i.condition, i.grade, i.purchasePrice, i.latestValue, i.status, i.source]);
        const csv = [headers, ...rows].map((row) => row.map((cell) => `"${String(cell ?? "").replaceAll('"', '""')}"`).join(",")).join("\\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "byoc-collection-prototype.csv";
        link.click();
        URL.revokeObjectURL(url);
        toast("CSV exported", "Downloaded the current in-memory collection.");
      }

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeModal();
          closeDrawer();
        }
      });

      $("modal").addEventListener("click", (event) => {
        if (event.target.id === "modal") closeModal();
      });
      $("drawer").addEventListener("click", (event) => {
        if (event.target.id === "drawer") closeDrawer();
      });

      render();
    </script>
  </body>
</html>
