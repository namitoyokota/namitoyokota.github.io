<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Making Seesaw</title>
    <!-- Tailwind CSS for Shadcn UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js for 3D animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for minimalist clean look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body class="bg-slate-50/50 text-slate-900 min-h-screen antialiased flex flex-col justify-between">

    <!-- Header Section -->
    <header class="border-b border-slate-200 bg-white/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-950 flex items-center gap-2">
                    ⚖️ Decision Making Seesaw
                </h1>
                <p class="text-sm text-slate-500">Compare two options side-by-side by weighing their pros and cons.</p>
            </div>
            <button id="reset-btn" class="text-xs bg-white text-slate-700 border border-slate-200 hover:bg-slate-50 font-medium px-3 py-1.5 rounded-md shadow-sm transition-colors duration-200">
                Reset to Default Example
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="max-w-6xl w-full mx-auto px-4 py-8 flex-grow grid grid-cols-1 gap-8">
        
        <!-- Input Columns Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- OPTION 1 COLUMN -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col justify-between">
                <div class="p-6 border-b border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <input id="title-1" type="text" class="text-lg font-semibold text-slate-900 border-b border-transparent hover:border-slate-200 focus:border-slate-900 focus:outline-none pb-0.5 w-3/4 transition-colors" value="Option A: Moving to the City">
                        <span id="score-badge-1" class="text-xs font-bold px-2.5 py-1 rounded-full bg-slate-100 text-slate-700 tracking-wide transition-all duration-300">
                            Net: 0
                        </span>
                    </div>

                    <!-- Add Factor Form -->
                    <form id="form-1" class="space-y-3 bg-slate-50/70 p-4 rounded-lg border border-slate-100">
                        <div class="flex gap-2">
                            <input id="input-desc-1" type="text" placeholder="Add a reason/factor..." required
                                class="flex-1 bg-white border border-slate-200 rounded-md px-3 py-1.5 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-1 focus:ring-slate-400 text-slate-900 shadow-sm">
                            
                            <select id="input-weight-1" class="bg-white border border-slate-200 rounded-md px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-slate-400 text-slate-700 shadow-sm cursor-pointer">
                                <option value="1">Weight: 1 (Minor)</option>
                                <option value="2">Weight: 2</option>
                                <option value="3">Weight: 3</option>
                                <option value="4">Weight: 4</option>
                                <option value="5" selected>Weight: 5 (Medium)</option>
                                <option value="6">Weight: 6</option>
                                <option value="7">Weight: 7</option>
                                <option value="8">Weight: 8</option>
                                <option value="9">Weight: 9</option>
                                <option value="10">Weight: 10 (Critical)</option>
                            </select>
                        </div>

                        <div class="flex items-center justify-between gap-4">
                            <!-- Pro/Con Toggle Button Group -->
                            <div class="flex p-0.5 bg-slate-200/60 rounded-md w-36">
                                <button type="button" id="toggle-pro-1" class="flex-1 text-center py-1 text-xs font-medium rounded-sm transition-all duration-150 bg-white text-emerald-700 shadow-sm">
                                    Pro
                                </button>
                                <button type="button" id="toggle-con-1" class="flex-1 text-center py-1 text-xs font-medium rounded-sm transition-all duration-150 text-slate-600 hover:text-slate-900">
                                    Con
                                </button>
                            </div>

                            <button type="submit" class="bg-slate-950 text-white hover:bg-slate-800 text-xs font-medium px-4 py-1.5 rounded-md transition-colors shadow-sm">
                                Add Factor
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Factor List Container -->
                <div class="p-6 flex-grow overflow-y-auto max-h-[280px] space-y-2" id="list-1">
                    <!-- Dynamic Items go here -->
                </div>
            </div>

            <!-- OPTION 2 COLUMN -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col justify-between">
                <div class="p-6 border-b border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <input id="title-2" type="text" class="text-lg font-semibold text-slate-900 border-b border-transparent hover:border-slate-200 focus:border-slate-900 focus:outline-none pb-0.5 w-3/4 transition-colors" value="Option B: Staying in the Suburbs">
                        <span id="score-badge-2" class="text-xs font-bold px-2.5 py-1 rounded-full bg-slate-100 text-slate-700 tracking-wide transition-all duration-300">
                            Net: 0
                        </span>
                    </div>

                    <!-- Add Factor Form -->
                    <form id="form-2" class="space-y-3 bg-slate-50/70 p-4 rounded-lg border border-slate-100">
                        <div class="flex gap-2">
                            <input id="input-desc-2" type="text" placeholder="Add a reason/factor..." required
                                class="flex-1 bg-white border border-slate-200 rounded-md px-3 py-1.5 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-1 focus:ring-slate-400 text-slate-900 shadow-sm">
                            
                            <select id="input-weight-2" class="bg-white border border-slate-200 rounded-md px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-slate-400 text-slate-700 shadow-sm cursor-pointer">
                                <option value="1">Weight: 1 (Minor)</option>
                                <option value="2">Weight: 2</option>
                                <option value="3">Weight: 3</option>
                                <option value="4">Weight: 4</option>
                                <option value="5" selected>Weight: 5 (Medium)</option>
                                <option value="6">Weight: 6</option>
                                <option value="7">Weight: 7</option>
                                <option value="8">Weight: 8</option>
                                <option value="9">Weight: 9</option>
                                <option value="10">Weight: 10 (Critical)</option>
                            </select>
                        </div>

                        <div class="flex items-center justify-between gap-4">
                            <!-- Pro/Con Toggle Button Group -->
                            <div class="flex p-0.5 bg-slate-200/60 rounded-md w-36">
                                <button type="button" id="toggle-pro-2" class="flex-1 text-center py-1 text-xs font-medium rounded-sm transition-all duration-150 bg-white text-emerald-700 shadow-sm">
                                    Pro
                                </button>
                                <button type="button" id="toggle-con-2" class="flex-1 text-center py-1 text-xs font-medium rounded-sm transition-all duration-150 text-slate-600 hover:text-slate-900">
                                    Con
                                </button>
                            </div>

                            <button type="submit" class="bg-slate-950 text-white hover:bg-slate-800 text-xs font-medium px-4 py-1.5 rounded-md transition-colors shadow-sm">
                                Add Factor
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Factor List Container -->
                <div class="p-6 flex-grow overflow-y-auto max-h-[280px] space-y-2" id="list-2">
                    <!-- Dynamic Items go here -->
                </div>
            </div>

        </div>

        <!-- 3D Seesaw Visualization Panel -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden p-6 flex flex-col items-center justify-center relative">
            <div class="absolute top-4 left-6 right-6 flex justify-between items-center pointer-events-none z-10">
                <span id="label-left" class="text-xs font-semibold uppercase tracking-wider text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded border border-indigo-100">Left Option</span>
                <div id="status-message" class="text-sm font-medium text-slate-500 bg-slate-50 px-4 py-1 rounded-full border border-slate-200/60">
                    Perfectly Balanced
                </div>
                <span id="label-right" class="text-xs font-semibold uppercase tracking-wider text-violet-600 bg-violet-50 px-2.5 py-1 rounded border border-violet-100">Right Option</span>
            </div>

            <!-- Canvas Container -->
            <div id="canvas-container" class="w-full h-72 md:h-80 cursor-grab active:cursor-grabbing mt-4"></div>
        </div>

    </main>

    <!-- Footer Footer -->
    <footer class="border-t border-slate-200 bg-white py-4 text-center text-xs text-slate-400">
        Interactive Decision Matrix Matrix • Clean Minimalist Architecture
    </footer>

    <script>
        // --- DATA & STATE MANAGEMENT ---
        const DEFAULT_STATE = {
            option1: {
                title: "Option A: Moving to the City",
                items: [
                    { id: "1", text: "Walkable to top-tier restaurants", weight: 7, type: "pro" },
                    { id: "2", text: "Commute time cut down to 10 mins", weight: 9, type: "pro" },
                    { id: "3", text: "Significantly higher rent prices", weight: 8, type: "con" },
                ]
            },
            option2: {
                title: "Option B: Staying in the Suburbs",
                items: [
                    { id: "4", text: "Extra space for a private home office", weight: 6, type: "pro" },
                    { id: "5", text: "Quiet, peaceful neighborhood ambience", weight: 5, type: "pro" },
                    { id: "6", text: "Requires driving everywhere for errands", weight: 6, type: "con" },
                ]
            }
        };

        let state = JSON.parse(localStorage.getItem('decision_seesaw_state')) || JSON.parse(JSON.stringify(DEFAULT_STATE));
        
        // Track the toggle values inside forms ('pro' or 'con')
        let formToggleState = { 1: 'pro', 2: 'pro' };

        // --- DOM ELEMENTS ---
        const titleInput1 = document.getElementById('title-1');
        const titleInput2 = document.getElementById('title-2');
        const listContainer1 = document.getElementById('list-1');
        const listContainer2 = document.getElementById('list-2');
        const scoreBadge1 = document.getElementById('score-badge-1');
        const scoreBadge2 = document.getElementById('score-badge-2');
        const statusMessage = document.getElementById('status-message');
        const labelLeft = document.getElementById('label-left');
        const labelRight = document.getElementById('label-right');

        // --- BUSINESS LOGIC ---
        function calculateNetScore(option) {
            return option.items.reduce((total, item) => {
                return total + (item.type === 'pro' ? item.weight : -item.weight);
            }, 0);
        }

        function saveState() {
            localStorage.setItem('decision_seesaw_state', JSON.stringify(state));
        }

        function renderUI() {
            // Update Titles
            titleInput1.value = state.option1.title;
            titleInput2.value = state.option2.title;
            labelLeft.textContent = state.option1.title || "Left Option";
            labelRight.textContent = state.option2.title || "Right Option";

            // Compute Scores
            const score1 = calculateNetScore(state.option1);
            const score2 = calculateNetScore(state.option2);

            // Update Badges
            updateScoreBadge(scoreBadge1, score1);
            updateScoreBadge(scoreBadge2, score2);

            // Update Central Balancing Text
            if (score1 > score2) {
                statusMessage.innerHTML = `👈 <span class="text-indigo-600 font-semibold">${state.option1.title.split(':')[0]}</span> is favored by <strong>${score1 - score2}</strong> pts`;
            } else if (score2 > score1) {
                statusMessage.innerHTML = `<span class="text-violet-600 font-semibold">${state.option2.title.split(':')[0]}</span> is favored by <strong>${score2 - score1}</strong> pts 👉`;
            } else {
                statusMessage.innerHTML = "⚖️ Both ideas are perfectly balanced";
            }

            // Render Item Lists
            renderList(listContainer1, state.option1.items, 1);
            renderList(listContainer2, state.option2.items, 2);

            // Sync with 3D Object Metrics
            update3DSeesaw(score1, score2);
        }

        function updateScoreBadge(badge, score) {
            badge.textContent = `Net Score: ${score > 0 ? '+' : ''}${score}`;
            badge.className = "text-xs font-bold px-2.5 py-1 rounded-full transition-all duration-300 ";
            if (score > 0) {
                badge.className += "bg-emerald-50 text-emerald-700 border border-emerald-100";
            } else if (score < 0) {
                badge.className += "bg-rose-50 text-rose-700 border border-rose-100";
            } else {
                badge.className += "bg-slate-100 text-slate-700 border border-slate-200";
            }
        }

        function renderList(container, items, optionNum) {
            container.innerHTML = '';
            if (items.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 text-center py-6 italic">No reasons listed yet. Add some above!</p>`;
                return;
            }

            items.forEach(item => {
                const itemRow = document.createElement('div');
                itemRow.className = `flex items-center justify-between p-2.5 rounded-lg border text-sm transition-all duration-200 animate-fadeIn ${
                    item.type === 'pro' 
                        ? 'bg-emerald-50/40 border-emerald-100/70 hover:bg-emerald-50/70' 
                        : 'bg-rose-50/40 border-rose-100/70 hover:bg-rose-50/70'
                }`;

                const badgeStyle = item.type === 'pro' 
                    ? 'bg-emerald-100 text-emerald-800' 
                    : 'bg-rose-100 text-rose-800';

                itemRow.innerHTML = `
                    <div class="flex items-center gap-2.5 flex-1 min-w-0">
                        <span class="text-[10px] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded ${badgeStyle}">
                            ${item.type}
                        </span>
                        <p class="text-slate-700 truncate pr-2">${item.text}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-semibold text-slate-500 bg-white px-2 py-0.5 border border-slate-200 rounded shadow-sm">
                            W: ${item.weight}
                        </span>
                        <button onclick="removeItem(${optionNum}, '${item.id}')" type="button" class="text-slate-400 hover:text-rose-600 transition-colors duration-150 rounded p-0.5 hover:bg-slate-100/80">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                        </button>
                    </div>
                `;
                container.appendChild(itemRow);
            });
        }

        window.removeItem = function(optionNum, itemId) {
            const optionKey = optionNum === 1 ? 'option1' : 'option2';
            state[optionKey].items = state[optionKey].items.filter(i => i.id !== itemId);
            saveState();
            renderUI();
        };

        // --- SETUP FORM INTERACTION & TOGGLES ---
        function setupFormListeners(num) {
            const form = document.getElementById(`form-${num}`);
            const btnPro = document.getElementById(`toggle-pro-${num}`);
            const btnCon = document.getElementById(`toggle-con-${num}`);

            btnPro.addEventListener('click', () => {
                formToggleState[num] = 'pro';
                btnPro.className = "flex-1 text-center py-1 text-xs font-medium rounded-sm transition-all duration-150 bg-white text-emerald-700 shadow-sm";
                btnCon.className = "flex-1 text-center py-1 text-xs font-medium rounded-sm transition-all duration-150 text-slate-600 hover:text-slate-900";
            });

            btnCon.addEventListener('click', () => {
                formToggleState[num] = 'con';
                btnCon.className = "flex-1 text-center py-1 text-xs font-medium rounded-sm transition-all duration-150 bg-white text-rose-700 shadow-sm";
                btnPro.className = "flex-1 text-center py-1 text-xs font-medium rounded-sm transition-all duration-150 text-slate-600 hover:text-slate-900";
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const descInput = document.getElementById(`input-desc-${num}`);
                const weightInput = document.getElementById(`input-weight-${num}`);
                const optionKey = num === 1 ? 'option1' : 'option2';

                const newItem = {
                    id: Date.now().toString(),
                    text: descInput.value.trim(),
                    weight: parseInt(weightInput.value),
                    type: formToggleState[num]
                };

                state[optionKey].items.push(newItem);
                saveState();
                renderUI();

                // Clear Inputs safely
                descInput.value = '';
                weightInput.value = '5';
            });
        }

        // Live change detection on Option Headers
        titleInput1.addEventListener('input', (e) => {
            state.option1.title = e.target.value;
            saveState();
            labelLeft.textContent = e.target.value || "Left Option";
        });
        titleInput2.addEventListener('input', (e) => {
            state.option2.title = e.target.value;
            saveState();
            labelRight.textContent = e.target.value || "Right Option";
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            if(confirm("Are you sure you want to revert to the default example data?")) {
                state = JSON.parse(JSON.stringify(DEFAULT_STATE));
                saveState();
                renderUI();
            }
        });


        // --- THREE.JS 3D VIEWPORT ENGINE ---
        let scene, camera, renderer, seesawPivot, weightMeshLeft, weightMeshRight;
        let targetRotationZ = 0;

        function init3DSpace() {
            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            // 1. Scene setup
            scene = new THREE.Scene();

            // 2. Camera positioning
            camera = new THREE.PerspectiveCamera(38, width / height, 0.1, 1000);
            camera.position.set(0, 1.8, 8.5);
            camera.lookAt(0, 0.2, 0);

            // 3. WebGL Renderer configuration with Alpha enablement
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // 4. Studio Lighting Rig Setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
            scene.add(ambientLight);

            const primaryDirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            primaryDirLight.position.set(4, 10, 5);
            primaryDirLight.castShadow = true;
            primaryDirLight.shadow.mapSize.width = 1024;
            primaryDirLight.shadow.mapSize.height = 1024;
            primaryDirLight.shadow.bias = -0.001;
            scene.add(primaryDirLight);

            const fillLight = new THREE.DirectionalLight(0xffffff, 0.2);
            fillLight.position.set(-4, 3, -2);
            scene.add(fillLight);

            // 5. Structure Elements Base Setup
            const structuralMaterial = new THREE.MeshStandardMaterial({ color: 0xf1f5f9, roughness: 0.5 }); // Slate 100 style
            const baseGeo = new THREE.BoxGeometry(6.5, 0.1, 2.5);
            const groundBase = new THREE.Mesh(baseGeo, structuralMaterial);
            groundBase.position.y = -0.9;
            groundBase.receiveShadow = true;
            scene.add(groundBase);

            // Fulcrum Stand (Triangle Triangle)
            const fulcrumGeo = new THREE.ConeGeometry(0.5, 0.9, 4);
            fulcrumGeo.rotateY(Math.PI / 4); // Turn box-like face forward
            const fulcrumMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.6 }); // Slate 400
            const fulcrumStand = new THREE.Mesh(fulcrumGeo, fulcrumMat);
            fulcrumStand.position.set(0, -0.45, 0);
            fulcrumStand.castShadow = true;
            scene.add(fulcrumStand);

            // 6. Assembly of Pivot Group
            seesawPivot = new THREE.Group();
            seesawPivot.position.set(0, 0, 0);
            scene.add(seesawPivot);

            // Main Seesaw Balance Plank
            const boardGeo = new THREE.BoxGeometry(6.0, 0.12, 1.2);
            const boardMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.4 }); // Slate 800 Look
            const plankMesh = new THREE.Mesh(boardGeo, boardMat);
            plankMesh.castShadow = true;
            plankMesh.receiveShadow = true;
            seesawPivot.add(plankMesh);

            // Option Boxes Objects Initial Setup
            const weightBoxGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            
            const leftMat = new THREE.MeshStandardMaterial({ color: 0x4f46e5, roughness: 0.3 }); // Indigo 600
            weightMeshLeft = new THREE.Mesh(weightBoxGeo, leftMat);
            weightMeshLeft.position.set(-2.4, 0.46, 0);
            weightMeshLeft.castShadow = true;
            seesawPivot.add(weightMeshLeft);

            const rightMat = new THREE.MeshStandardMaterial({ color: 0x7c3aed, roughness: 0.3 }); // Violet 600
            weightMeshRight = new THREE.Mesh(weightBoxGeo, rightMat);
            weightMeshRight.position.set(2.4, 0.46, 0);
            weightMeshRight.castShadow = true;
            seesawPivot.add(weightMeshRight);

            // Start Animation Tick Loop
            tick();

            // Observe resize constraints properly
            const resizeObserver = new ResizeObserver(entries => {
                for (let entry of entries) {
                    const w = entry.contentRect.width;
                    const h = entry.contentRect.height;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                }
            });
            resizeObserver.observe(container);
        }

        function update3DSeesaw(scoreLeft, scoreRight) {
            if (!seesawPivot) return; // Wait if context isn't fully ready yet

            // Calculate Target Angle Difference (Clamped to prevent catastrophic tilting over edge limits)
            const structuralDifference = scoreLeft - scoreRight;
            
            // Map structural delta difference directly into visual rotation constraints
            // Positive angle lifts right side up, meaning Left side goes DOWN.
            // So if left is greater, target angle needs to be positive.
            targetRotationZ = Math.max(-0.42, Math.min(0.42, structuralDifference * 0.025));

            // Dynamically morph individual volume masses (Y scale mapping) matching computed inputs values
            // Normalize minimum starting base sizes to 0.2 to avoid complete invisibility profiles
            const leftHeightScale = Math.max(0.2, 0.7 + scoreLeft * 0.05);
            weightMeshLeft.scale.set(1, leftHeightScale, 1);
            weightMeshLeft.position.y = 0.06 + (leftHeightScale * 0.4);

            const rightHeightScale = Math.max(0.2, 0.7 + scoreRight * 0.05);
            weightMeshRight.scale.set(1, rightHeightScale, 1);
            weightMeshRight.position.y = 0.06 + (rightHeightScale * 0.4);

            // Interactive Color Shifts to match status: Rose tint if the overall balance of an option is failing (negative score)
            if (scoreLeft < 0) {
                weightMeshLeft.material.color.setHex(0xf43f5e); // Rose 500
            } else {
                weightMeshLeft.material.color.setHex(0x4f46e5); // Indigo 600
            }

            if (scoreRight < 0) {
                weightMeshRight.material.color.setHex(0xf43f5e); // Rose 500
            } else {
                weightMeshRight.material.color.setHex(0x7c3aed); // Violet 600
            }
        }

        function tick() {
            requestAnimationFrame(tick);

            // Smooth Interpolation Frame Updates (Lerp logic)
            seesawPivot.rotation.z += (targetRotationZ - seesawPivot.rotation.z) * 0.075;

            renderer.render(scene, camera);
        }

        // --- LIFECYCLE INITS ---
        document.addEventListener('DOMContentLoaded', () => {
            setupFormListeners(1);
            setupFormListeners(2);
            init3DSpace();
            renderUI();
        });
    </script>
</body>
</html>
