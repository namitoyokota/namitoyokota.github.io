<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Day Goal Calendar</title>
    <!-- Tailwind CSS for Shadcn UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hexagon { clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
        .glow-gold {
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.6), inset 0 0 8px rgba(251, 191, 36, 0.8);
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="bg-slate-50/50 text-slate-900 min-h-screen antialiased flex flex-col justify-between">

    <!-- Header Section -->
    <header class="border-b border-slate-200 bg-white/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-950 flex items-center gap-2">🗓️ Every Day Goal Calendar</h1>
                <p class="text-sm text-slate-500">A high-fidelity digital edition of the iconic interactive hardware tracker.</p>
            </div>
            <button id="clear-board-btn" class="text-xs bg-white text-rose-600 border border-slate-200 hover:bg-rose-50 hover:border-rose-200 font-medium px-3 py-1.5 rounded-md shadow-sm transition-all duration-200">Reset Board</button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="max-w-7xl w-full mx-auto px-4 py-8 flex-grow flex flex-col gap-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center col-span-1 md:col-span-2">
                <label class="text-xs font-medium text-slate-400 uppercase tracking-wider mb-1.5">Current Tracker Focus / Year Goal</label>
                <input id="goal-input" type="text" value="Build meaningful routines every single day." class="text-base font-semibold text-slate-900 bg-slate-50/50 hover:bg-slate-50 focus:bg-white border border-slate-200/80 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-slate-400 shadow-sm transition-all w-full">
            </div>
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm grid grid-cols-2 gap-2 text-center items-center">
                <div class="border-r border-slate-100 py-1">
                    <p class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">Days Active</p>
                    <p id="stat-count" class="text-2xl font-bold text-slate-950 mt-0.5">0 <span class="text-xs font-normal text-slate-400">/ 365</span></p>
                </div>
                <div>
                    <p class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">Consistency</p>
                    <p id="stat-percent" class="text-2xl font-bold text-amber-500 mt-0.5">0.0%</p>
                </div>
            </div>
        </div>

        <!-- Physical Board Frame -->
        <div class="bg-zinc-100 p-4 md:p-8 rounded-2xl border border-slate-200 shadow-inner flex justify-center">
            <div class="bg-[#141416] text-[#dfb76c] p-6 md:p-10 rounded-xl border-4 border-amber-900/20 shadow-2xl w-full max-w-4xl overflow-x-auto select-none relative">
                
                <div class="min-w-[760px] grid grid-cols-12 gap-x-2.5 gap-y-4">
                    <!-- Month Labels -->
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">jan</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">feb</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">mar</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">apr</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">may</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">jun</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">jul</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">aug</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">sep</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">oct</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">nov</div>
                    <div class="text-center text-xs font-medium tracking-widest lowercase opacity-80 pb-2 border-b border-zinc-800/60">dec</div>

                    <!-- Dynamic Row Matrix Area -->
                    <div id="calendar-matrix-grid" class="col-span-12 grid grid-cols-12 gap-x-2.5 gap-y-1.5"></div>
                </div>

                <div class="mt-8 pt-4 border-t border-zinc-900/60 flex justify-center items-center gap-8 text-[11px] font-medium tracking-widest text-[#dfb76c]/40 uppercase">
                    <span>🌙 night</span> <span class="text-amber-600/30">•</span> <span>☀️ day</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const MONTH_DAYS = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        let calendarState = JSON.parse(localStorage.getItem('yetch_calendar_state')) || {};
        
        const matrixGrid = document.getElementById('calendar-matrix-grid');
        const goalInput = document.getElementById('goal-input');
        const statCount = document.getElementById('stat-count');
        const statPercent = document.getElementById('stat-percent');

        function generateMatrix() {
            matrixGrid.innerHTML = '';
            for (let dayNum = 1; dayNum <= 31; dayNum++) {
                for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
                    const maxDays = MONTH_DAYS[monthIndex];
                    const cellKey = `${monthIndex}-${dayNum}`;
                    const cellContainer = document.createElement('div');
                    cellContainer.className = "flex justify-center items-center h-7";

                    if (dayNum <= maxDays) {
                        const isLit = calendarState[cellKey] || false;
                        const hex = document.createElement('button');
                        hex.type = "button";
                        updateHexStyle(hex, isLit);
                        hex.innerHTML = `<span class="text-[10px] font-bold tracking-tighter">${dayNum}</span>`;
                        
                        hex.addEventListener('click', () => {
                            const newState = !calendarState[cellKey];
                            if (newState) calendarState[cellKey] = true; else delete calendarState[cellKey];
                            localStorage.setItem('yetch_calendar_state', JSON.stringify(calendarState));
                            updateHexStyle(hex, newState);
                            calculateStats();
                        });
                        cellContainer.appendChild(hex);
                    } else {
                        const empty = document.createElement('div');
                        empty.className = "w-5 h-6 bg-zinc-900/10 border border-zinc-900/20 hexagon opacity-20 pointer-events-none";
                        cellContainer.appendChild(empty);
                    }
                    matrixGrid.appendChild(cellContainer);
                }
            }
        }

        function updateHexStyle(el, isLit) {
            const base = "w-5 h-6 flex items-center justify-center hexagon transition-all duration-300 transform active:scale-90 focus:outline-none border font-sans ";
            el.className = isLit ? base + "bg-yellow-400 border-amber-300 text-zinc-950 font-bold shadow-lg glow-gold scale-105" : base + "bg-[#1f1e21] border-[#c09e5b]/40 text-[#c09e5b]/70 hover:bg-zinc-800/80 hover:border-[#c09e5b]/80";
        }

        function calculateStats() {
            const total = Object.keys(calendarState).length;
            statCount.innerHTML = `${total} <span class="text-xs font-normal text-slate-400">/ 365</span>`;
            statPercent.textContent = `${((total / 365) * 100).toFixed(1)}%`;
        }

        goalInput.value = localStorage.getItem('yetch_calendar_goal') || "Build meaningful routines every single day.";
        goalInput.addEventListener('input', (e) => localStorage.setItem('yetch_calendar_goal', e.target.value));
        document.getElementById('clear-board-btn').addEventListener('click', () => {
            if (confirm("Reset calendar?")) { calendarState = {}; localStorage.removeItem('yetch_calendar_state'); generateMatrix(); calculateStats(); }
        });

        generateMatrix();
        calculateStats();
    </script>
</body>
</html>
