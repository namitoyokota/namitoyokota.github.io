<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "Inter",
                "ui-sans-serif",
                "system-ui",
                "-apple-system",
                "BlinkMacSystemFont",
                "Segoe UI",
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-white text-black antialiased">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col gap-6 px-4 py-5 sm:px-6 lg:px-8">
      <header class="flex flex-col gap-4 border-b border-black pb-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.28em]">Personal log</p>
          <h1 class="mt-2 text-3xl font-black leading-none sm:text-5xl">Workout Tracker</h1>
        </div>
        <div class="flex flex-col gap-3 sm:items-end">
          <nav class="grid grid-cols-2 border border-black text-xs font-black uppercase tracking-[0.16em]" aria-label="Views">
            <button
              id="trackerViewButton"
              type="button"
              class="px-4 py-3 hover:bg-black hover:text-white focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
            >
              Log
            </button>
            <button
              id="statsViewButton"
              type="button"
              class="border-l border-black px-4 py-3 hover:bg-black hover:text-white focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
            >
              Stats
            </button>
          </nav>
          <div id="todaySummary" class="border border-black px-4 py-3 text-sm font-semibold"></div>
        </div>
      </header>

      <section id="trackerView" class="grid gap-6 lg:grid-cols-[17rem_1fr]">
        <aside class="lg:sticky lg:top-5 lg:self-start">
          <h2 class="mb-3 text-sm font-black uppercase tracking-[0.2em]">Body Part</h2>
          <nav id="bodyPartNav" class="grid grid-cols-2 gap-2 sm:grid-cols-4 lg:grid-cols-1" aria-label="Body parts"></nav>
        </aside>

        <div class="grid gap-6">
          <section>
            <div class="mb-3 flex items-center justify-between gap-3">
              <h2 id="exerciseListTitle" class="text-sm font-black uppercase tracking-[0.2em]">Exercises</h2>
              <span id="exerciseCount" class="text-sm font-semibold"></span>
            </div>
            <div id="exerciseGrid" class="grid gap-3 sm:grid-cols-2"></div>
          </section>

          <section id="trackerPanel" class="border border-black bg-white p-4 sm:p-5">
            <div class="flex items-start justify-between gap-4">
              <div>
                <p id="selectedBodyPart" class="text-xs font-black uppercase tracking-[0.24em]"></p>
                <h2 id="selectedExercise" class="mt-2 text-2xl font-black leading-tight"></h2>
              </div>
              <button
                id="clearExercise"
                type="button"
                class="hidden shrink-0 border border-black px-3 py-2 text-xs font-black uppercase tracking-[0.18em] hover:bg-black hover:text-white focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
              >
                Clear
              </button>
            </div>

            <img id="selectedImage" class="mt-5 aspect-square w-full border border-black object-contain" alt="" />

            <div id="lastWorkedOut" class="mt-5 min-h-5 text-sm font-semibold"></div>

            <form id="setsForm" class="mt-5">
              <div class="grid grid-cols-[3.25rem_1fr_1fr_2.75rem] gap-2 border-b border-black pb-2 text-xs font-black uppercase tracking-[0.16em]">
                <span>Set</span>
                <span>Weight</span>
                <span>Reps</span>
                <span>Done</span>
              </div>
              <div id="setRows" class="grid gap-2 pt-3"></div>
            </form>

            <section id="restTimer" class="mt-5 border-t border-black pt-5" aria-labelledby="restTimerTitle">
              <div class="flex items-end justify-between gap-3">
                <div>
                  <h3 id="restTimerTitle" class="text-xs font-black uppercase tracking-[0.2em]">Rest Timer</h3>
                  <div id="timerDisplay" class="mt-2 font-mono text-4xl font-black leading-none tabular-nums">00:00</div>
                </div>
                <button
                  id="timerToggle"
                  type="button"
                  class="h-11 border border-black px-4 text-sm font-black uppercase tracking-[0.16em] hover:bg-black hover:text-white focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
                >
                  Start
                </button>
              </div>
              <div class="mt-4">
                <button
                  id="timerReset"
                  type="button"
                  class="h-10 w-full border border-black text-xs font-black uppercase tracking-[0.12em] hover:bg-black hover:text-white focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
                >
                  Reset
                </button>
              </div>
            </section>
          </section>
        </div>
      </section>

      <section id="statsView" class="hidden grid gap-6" aria-labelledby="statsTitle">
        <div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <p class="text-xs font-black uppercase tracking-[0.24em]">Dashboard</p>
            <h2 id="statsTitle" class="mt-2 text-3xl font-black leading-tight">Workout Stats</h2>
          </div>
          <div id="statsDateRange" class="text-sm font-semibold"></div>
        </div>

        <div id="statsOverview" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4"></div>

        <div class="grid gap-6 lg:grid-cols-[1fr_1fr]">
          <section class="border border-black p-4 sm:p-5" aria-labelledby="bodyPartStatsTitle">
            <h3 id="bodyPartStatsTitle" class="text-sm font-black uppercase tracking-[0.2em]">Body Part Breakdown</h3>
            <div id="bodyPartStats" class="mt-4 grid gap-3"></div>
          </section>

          <section class="border border-black p-4 sm:p-5" aria-labelledby="recentStatsTitle">
            <h3 id="recentStatsTitle" class="text-sm font-black uppercase tracking-[0.2em]">Recent Activity</h3>
            <div id="recentActivity" class="mt-4 grid gap-3"></div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "workout-tracker:v1";
      const bodyParts = [
        {
          id: "back",
          name: "Back",
          exercises: [
            "ASSISTED-PULL-UP-MACHINE.png",
            "CABLE-V-BAR-SEATED-ROW.png",
            "ROW-MACHINE.png",
            "SMITH-MACHINE-BENT-OVER-ROW.png",
            "WIDE-GRIP-LAT-PULLDOWN.png",
          ],
        },
        {
          id: "biceps",
          name: "Biceps",
          exercises: [
            "DUMBBELL-BICEP-CURL.png",
            "DUMBBELL-CROSS-BODY-HAMMER-CURLS.png",
            "DUMBBELL-PREACHER-CURL.png",
            "EZ-BAR-CLOSE-GRIP-CURL.png",
          ],
        },
        {
          id: "chest",
          name: "Chest",
          exercises: [
            "CABLE-STANDING-CHEST-FLY.png",
            "CHEST-DIP.png",
            "CHEST-PRESS-MACHINE.png",
            "HANDLE-PUSH-UP.png",
            "INCLINE-CHEST-PRESS-MACHINE.png",
            "ISO-LATERAL-DECLINE-PRESS.png",
            "PECK-DECK-MACHINE.png",
          ],
        },
        {
          id: "core",
          name: "Core",
          exercises: [
            "AB-CRUNCH-MACHINE.png",
            "BENT-KNEE-LEG-RAISE.png",
            "BICYCLE-CRUNCH.png",
            "CABLE-ROPE-CRUNCH.png",
            "ELBOW-TO-KNEE-CRUNCHES.png",
            "HEEL-TAPS.png",
            "LEG-LIFTS.png",
            "LOW-PLANK.png",
            "SUITCASES.png",
            "TOE-TOUCHES.png",
          ],
        },
        {
          id: "hamstrings",
          name: "Hamstrings",
          exercises: [
            "DUMBBELL-GOBLET-SQUAT.png",
            "DUMBBELL-ROMANIAN-DEADLIFT.png",
            "LYING-HAMSTRING-CURL-MACHINE.png",
            "SEATED-HAMSTRING-CURL-MACHINE.png",
            "STANDING-SINGLE-LEG-HAMSTRING-CURL-MACHINE.png",
          ],
        },
        {
          id: "quads",
          name: "Quads",
          exercises: [
            "BARBELL-LUNGES.png",
            "DUMBBELL-LUNGES.png",
            "LEG-PRESS-MACHINE.png",
            "SEATED-LEG-EXTENSION-MACHINE.png",
            "SMITH-MACHINE-BULGARIAN-SPLIT-SQUATS.png",
          ],
        },
        {
          id: "shoulders",
          name: "Shoulders",
          exercises: [
            "CABLE-LATERAL-RAISE.png",
            "DUMBBELL-BENT-OVER-REVERSE-FLY.png",
            "DUMBBELL-LATERAL-RAISE.png",
            "PLATE-FRONT-RAISE.png",
            "SHOULDER-PRESS-MACHINE.png",
          ],
        },
        {
          id: "triceps",
          name: "Triceps",
          exercises: [
            "CABLE-BENT-OVER-TRICEP-EXTENSION.png",
            "CABLE-PUSH-DOWN.png",
            "DUMBBELL-TRICEP-EXTENSION.png",
          ],
        },
      ];

      const state = {
        activeBodyPart: getDefaultBodyPartId(),
        activeExerciseId: null,
        activeView: "tracker",
        entries: loadEntries(),
        timer: {
          elapsedSeconds: 0,
          startTime: null,
          intervalId: null,
        },
      };

      const elements = {
        trackerViewButton: document.querySelector("#trackerViewButton"),
        statsViewButton: document.querySelector("#statsViewButton"),
        trackerView: document.querySelector("#trackerView"),
        statsView: document.querySelector("#statsView"),
        bodyPartNav: document.querySelector("#bodyPartNav"),
        exerciseListTitle: document.querySelector("#exerciseListTitle"),
        exerciseCount: document.querySelector("#exerciseCount"),
        exerciseGrid: document.querySelector("#exerciseGrid"),
        trackerPanel: document.querySelector("#trackerPanel"),
        selectedBodyPart: document.querySelector("#selectedBodyPart"),
        selectedExercise: document.querySelector("#selectedExercise"),
        selectedImage: document.querySelector("#selectedImage"),
        lastWorkedOut: document.querySelector("#lastWorkedOut"),
        setRows: document.querySelector("#setRows"),
        clearExercise: document.querySelector("#clearExercise"),
        todaySummary: document.querySelector("#todaySummary"),
        timerDisplay: document.querySelector("#timerDisplay"),
        timerToggle: document.querySelector("#timerToggle"),
        timerReset: document.querySelector("#timerReset"),
        statsDateRange: document.querySelector("#statsDateRange"),
        statsOverview: document.querySelector("#statsOverview"),
        bodyPartStats: document.querySelector("#bodyPartStats"),
        recentActivity: document.querySelector("#recentActivity"),
      };

      function loadEntries() {
        try {
          const stored = window.localStorage.getItem(STORAGE_KEY);
          return stored ? normalizeEntries(JSON.parse(stored)) : {};
        } catch {
          return {};
        }
      }

      function saveEntries() {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
      }

      function formatExerciseName(fileName) {
        return fileName
          .replace(/\.[^.]+$/, "")
          .split("-")
          .map((word) => word.charAt(0) + word.slice(1).toLowerCase())
          .join(" ");
      }

      function getExerciseId(bodyPartId, fileName) {
        return `${bodyPartId}/${fileName.replace(/\.[^.]+$/, "")}`;
      }

      function getExercisePath(bodyPartId, fileName) {
        return `assets/${bodyPartId}/${fileName}`;
      }

      function getDefaultBodyPartId() {
        return bodyParts.find((part) => part.exercises.length)?.id ?? bodyParts[0].id;
      }

      function getFirstExerciseId(bodyPartId) {
        const bodyPart = bodyParts.find((part) => part.id === bodyPartId);
        const firstExercise = bodyPart?.exercises[0];
        return firstExercise ? getExerciseId(bodyPart.id, firstExercise) : null;
      }

      function getExerciseById(exerciseId) {
        for (const bodyPart of bodyParts) {
          for (const fileName of bodyPart.exercises) {
            const id = getExerciseId(bodyPart.id, fileName);
            if (id === exerciseId) {
              return {
                id,
                bodyPart,
                fileName,
                name: formatExerciseName(fileName),
                path: getExercisePath(bodyPart.id, fileName),
              };
            }
          }
        }
        return null;
      }

      function restoreSelectionFromUrl() {
        const params = new URLSearchParams(window.location.search);
        state.activeView = params.get("view") === "stats" ? "stats" : "tracker";
        const requestedBodyPart = params.get("bodyPart");
        const requestedExercise = params.get("exercise");
        const exercise = requestedExercise ? getExerciseById(requestedExercise) : null;
        const bodyPart = bodyParts.find((part) => part.id === requestedBodyPart);

        if (exercise) {
          state.activeBodyPart = exercise.bodyPart.id;
          state.activeExerciseId = exercise.id;
          return;
        }

        if (bodyPart) {
          state.activeBodyPart = bodyPart.id;
          state.activeExerciseId = getFirstExerciseId(bodyPart.id);
          return;
        }

        state.activeBodyPart = getDefaultBodyPartId();
        state.activeExerciseId = getFirstExerciseId(state.activeBodyPart);
      }

      function updateUrlSelection() {
        const url = new URL(window.location.href);

        if (state.activeView === "stats") {
          url.searchParams.set("view", "stats");
        } else {
          url.searchParams.delete("view");
        }

        if (state.activeBodyPart) {
          url.searchParams.set("bodyPart", state.activeBodyPart);
        } else {
          url.searchParams.delete("bodyPart");
        }

        if (state.activeExerciseId) {
          url.searchParams.set("exercise", state.activeExerciseId);
        } else {
          url.searchParams.delete("exercise");
        }

        const nextUrl = `${url.pathname}${url.search}${url.hash}`;
        const currentUrl = `${window.location.pathname}${window.location.search}${window.location.hash}`;
        if (nextUrl !== currentUrl) {
          window.history.replaceState(null, "", nextUrl);
        }
      }

      function setActiveView(view) {
        state.activeView = view === "stats" ? "stats" : "tracker";
        updateUrlSelection();
        render();
      }

      function todayDateString() {
        const now = new Date();
        const offset = now.getTimezoneOffset();
        const localDate = new Date(now.getTime() - offset * 60000);
        return localDate.toISOString().slice(0, 10);
      }

      function prettyDate(dateString) {
        if (!dateString) return "";
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          year: "numeric",
        }).format(new Date(`${dateString}T00:00:00`));
      }

      function normalizeEntries(entries) {
        return Object.fromEntries(
          Object.entries(entries || {}).map(([exerciseId, entry]) => {
            const sessions = Array.isArray(entry?.sessions)
              ? entry.sessions
              : entry?.sets
                ? [entry]
                : [];

            return [
              exerciseId,
              {
                sessions: sessions.map(normalizeSession),
              },
            ];
          })
        );
      }

      function normalizeSession(session = {}) {
        const sets = Array.isArray(session.sets) ? session.sets : [];
        const normalizedSets = sets
          .slice(0, 5)
          .map((set) => ({
            weight: set?.weight ?? "",
            reps: set?.reps ?? "",
            completed: Boolean(set?.completed),
          }));

        while (normalizedSets.length < 5) {
          normalizedSets.push({ weight: "", reps: "", completed: false });
        }

        return {
          workoutDate: session.workoutDate || todayDateString(),
          updatedAt: session.updatedAt || "",
          sets: normalizedSets,
        };
      }

      function hasLoggedData(session) {
        return Boolean(session?.sets?.some((set) => set.completed));
      }

      function getLoggedSessions(entry) {
        return [...(entry?.sessions || [])]
          .filter(hasLoggedData)
          .sort((a, b) => {
            const dateComparison = String(b.workoutDate || "").localeCompare(String(a.workoutDate || ""));
            return dateComparison || String(b.updatedAt || "").localeCompare(String(a.updatedAt || ""));
          });
      }

      function getLatestLoggedSession(entry) {
        return getLoggedSessions(entry)[0] || null;
      }

      function getPreviousSession(entry, currentDate = todayDateString()) {
        return getLoggedSessions(entry).find((session) => session.workoutDate < currentDate) || null;
      }

      function isCompletedToday(entry) {
        return getLoggedSessions(entry).some((session) => session.workoutDate === todayDateString());
      }

      function isBodyPartCompletedToday(bodyPart) {
        return bodyPart.exercises.some((fileName) => {
          const entry = state.entries[getExerciseId(bodyPart.id, fileName)];
          return isCompletedToday(entry);
        });
      }

      function escapeAttribute(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll('"', "&quot;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function getEntry(exerciseId) {
        if (!state.entries[exerciseId]) {
          state.entries[exerciseId] = {
            sessions: [],
          };
        }

        const entry = state.entries[exerciseId];
        entry.sessions = Array.isArray(entry.sessions) ? entry.sessions.map(normalizeSession) : [];
        return entry;
      }

      function getCurrentSession(exerciseId) {
        const entry = getEntry(exerciseId);
        const today = todayDateString();
        let session = entry.sessions.find((item) => item.workoutDate === today);

        if (!session) {
          session = normalizeSession({ workoutDate: today });
          entry.sessions.push(session);
        }

        return session;
      }

      function averageSetValue(session, field) {
        const values = (session?.sets || [])
          .filter((set) => set.completed)
          .map((set) => Number(set[field]))
          .filter((value) => Number.isFinite(value) && value > 0);

        if (!values.length) return null;
        return values.reduce((total, value) => total + value, 0) / values.length;
      }

      function completedSetCount(session) {
        return (session?.sets || []).filter((set) => set.completed).length;
      }

      function completedWorkoutVolume(session) {
        return (session?.sets || []).reduce((total, set) => {
          if (!set.completed) return total;
          const weight = Number(set.weight);
          const reps = Number(set.reps);
          return Number.isFinite(weight) && Number.isFinite(reps) ? total + weight * reps : total;
        }, 0);
      }

      function getAllLoggedSessions() {
        const sessions = [];

        bodyParts.forEach((bodyPart) => {
          bodyPart.exercises.forEach((fileName) => {
            const exerciseId = getExerciseId(bodyPart.id, fileName);
            const exerciseName = formatExerciseName(fileName);
            getLoggedSessions(state.entries[exerciseId]).forEach((session) => {
              sessions.push({
                exerciseId,
                exerciseName,
                bodyPartId: bodyPart.id,
                bodyPartName: bodyPart.name,
                session,
                completedSets: completedSetCount(session),
                volume: completedWorkoutVolume(session),
              });
            });
          });
        });

        return sessions.sort((a, b) => {
          const dateComparison = String(b.session.workoutDate || "").localeCompare(String(a.session.workoutDate || ""));
          return dateComparison || String(b.session.updatedAt || "").localeCompare(String(a.session.updatedAt || ""));
        });
      }

      function uniqueWorkoutDateCount(sessions) {
        return new Set(sessions.map((item) => item.session.workoutDate).filter(Boolean)).size;
      }

      function getCurrentStreak(sessions) {
        const dates = new Set(sessions.map((item) => item.session.workoutDate).filter(Boolean));
        let streak = 0;
        const cursor = new Date(`${todayDateString()}T00:00:00`);

        while (dates.has(cursor.toISOString().slice(0, 10))) {
          streak += 1;
          cursor.setDate(cursor.getDate() - 1);
        }

        return streak;
      }

      function formatWholeNumber(value) {
        return new Intl.NumberFormat().format(Math.round(value));
      }

      function formatAverage(value) {
        if (value === null) return "-";
        const rounded = Math.round(value * 10) / 10;
        return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
      }

      function formatTimer(seconds) {
        const safeSeconds = Math.max(0, seconds);
        const minutes = Math.floor(safeSeconds / 60);
        const remainingSeconds = safeSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(remainingSeconds).padStart(2, "0")}`;
      }

      function isTimerRunning() {
        return state.timer.intervalId !== null;
      }

      function renderTimer() {
        elements.timerDisplay.textContent = formatTimer(
          state.timer.elapsedSeconds + (isTimerRunning() ? Math.floor((Date.now() - state.timer.startTime) / 1000) : 0)
        );
        elements.timerToggle.textContent = isTimerRunning() ? "Pause" : "Start";
        elements.timerToggle.setAttribute("aria-pressed", isTimerRunning() ? "true" : "false");
      }

      function stopTimer() {
        if (state.timer.intervalId !== null) {
          window.clearInterval(state.timer.intervalId);
          state.timer.intervalId = null;
        }
        if (state.timer.startTime !== null) {
          state.timer.elapsedSeconds += Math.floor((Date.now() - state.timer.startTime) / 1000);
          state.timer.startTime = null;
        }
        renderTimer();
      }

      function updateTimerRemaining() {
        renderTimer();
      }

      function startTimer() {
        if (state.timer.startTime !== null) {
          return;
        }

        state.timer.startTime = Date.now();
        state.timer.intervalId = window.setInterval(updateTimerRemaining, 250);
        renderTimer();
        updateTimerRemaining();
      }

      function resetTimer() {
        stopTimer();
        state.timer.elapsedSeconds = 0;
        renderTimer();
      }

      function previousSummaryText(session) {
        if (!session) return "";
        const averageWeight = averageSetValue(session, "weight");
        const averageReps = averageSetValue(session, "reps");
        const completedSets = completedSetCount(session);
        const summaryParts = [];

        summaryParts.push(`${completedSets} completed set${completedSets === 1 ? "" : "s"}`);
        if (averageWeight !== null) summaryParts.push(`${formatAverage(averageWeight)} lb avg`);
        if (averageReps !== null) summaryParts.push(`${formatAverage(averageReps)} reps avg`);
        return summaryParts.length ? `Previous: ${summaryParts.join(" · ")}` : "";
      }

      function renderPreviousInfo(session) {
        const previousText = previousSummaryText(session);
        elements.lastWorkedOut.innerHTML = session
          ? `
            <p>Last worked out ${prettyDate(session.workoutDate)}</p>
            ${previousText ? `<p class="mt-1">${previousText}</p>` : ""}
          `
          : "";
      }

      function findActiveExercise() {
        return getExerciseById(state.activeExerciseId);
      }

      function renderBodyParts() {
        elements.bodyPartNav.innerHTML = "";

        bodyParts.forEach((bodyPart) => {
          const button = document.createElement("button");
          const isActive = bodyPart.id === state.activeBodyPart;
          const isCompleted = isBodyPartCompletedToday(bodyPart);
          button.type = "button";
          button.className = [
            "flex h-12 items-center justify-between border px-3 text-left text-sm font-black uppercase tracking-[0.14em] focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2",
            isActive
              ? "border-black bg-black text-white"
              : isCompleted
                ? "border-black bg-zinc-200 text-black hover:bg-zinc-300"
                : "border-black bg-white text-black hover:bg-black hover:text-white",
          ].join(" ");
          button.setAttribute("aria-current", isActive ? "true" : "false");
          button.innerHTML = `<span>${bodyPart.name}</span><span>${bodyPart.exercises.length}</span>`;
          button.addEventListener("click", () => {
            state.activeBodyPart = bodyPart.id;
            state.activeExerciseId = getFirstExerciseId(bodyPart.id);
            updateUrlSelection();
            render();
          });
          elements.bodyPartNav.append(button);
        });
      }

      function renderExercises() {
        const bodyPart = bodyParts.find((part) => part.id === state.activeBodyPart);
        elements.exerciseListTitle.textContent = bodyPart.name;
        elements.exerciseCount.textContent = `${bodyPart.exercises.length} exercise${bodyPart.exercises.length === 1 ? "" : "s"}`;
        elements.exerciseGrid.innerHTML = "";

        if (!bodyPart.exercises.length) {
          const empty = document.createElement("div");
          empty.className = "border border-black p-6 text-center text-sm font-bold sm:col-span-2";
          empty.textContent = "No exercises yet";
          elements.exerciseGrid.append(empty);
          return;
        }

        bodyPart.exercises.forEach((fileName) => {
          const id = getExerciseId(bodyPart.id, fileName);
          const entry = state.entries[id];
          const latestSession = getLatestLoggedSession(entry);
          const button = document.createElement("button");
          const isActive = id === state.activeExerciseId;
          const isCompleted = isCompletedToday(entry);
          button.type = "button";
          button.className = [
            "group grid min-h-36 grid-cols-[6.5rem_minmax(0,1fr)] gap-3 overflow-hidden border p-3 text-left focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2",
            isActive
              ? "border-black bg-black text-white"
              : isCompleted
                ? "border-black bg-zinc-200 text-black hover:bg-zinc-300"
                : "border-black bg-white text-black hover:bg-black hover:text-white",
          ].join(" ");
          button.setAttribute("aria-current", isActive ? "true" : "false");
          button.innerHTML = `
            <img class="aspect-square w-full border border-current bg-white object-contain" src="${getExercisePath(bodyPart.id, fileName)}" alt="" loading="lazy" />
            <span class="flex min-w-0 flex-col justify-between gap-3">
              <span class="break-words text-lg font-black leading-tight">${formatExerciseName(fileName)}</span>
              <span class="text-xs font-bold uppercase tracking-[0.16em]">${latestSession ? prettyDate(latestSession.workoutDate) : "Not logged"}</span>
            </span>
          `;
          button.addEventListener("click", () => {
            state.activeExerciseId = id;
            state.activeBodyPart = bodyPart.id;
            updateUrlSelection();
            render();
          });
          elements.exerciseGrid.append(button);
        });
      }

      function renderTracker() {
        const activeExercise = findActiveExercise();

        if (!activeExercise) {
          elements.selectedBodyPart.textContent = "No exercise selected";
          elements.selectedExercise.textContent = "Choose an exercise";
          elements.selectedImage.removeAttribute("src");
          elements.selectedImage.alt = "";
          elements.selectedImage.classList.add("hidden");
          elements.lastWorkedOut.textContent = "";
          elements.setRows.innerHTML = "";
          elements.clearExercise.classList.add("hidden");
          return;
        }

        const entry = getEntry(activeExercise.id);
        const currentSession = getCurrentSession(activeExercise.id);
        const previousSession = getPreviousSession(entry);
        elements.selectedBodyPart.textContent = activeExercise.bodyPart.name;
        elements.selectedExercise.textContent = activeExercise.name;
        elements.selectedImage.src = activeExercise.path;
        elements.selectedImage.alt = activeExercise.name;
        elements.selectedImage.classList.remove("hidden");
        elements.clearExercise.classList.remove("hidden");

        renderPreviousInfo(previousSession);

        elements.setRows.innerHTML = "";
        currentSession.sets.forEach((set, index) => {
          const row = document.createElement("div");
          row.className = "grid grid-cols-[3.25rem_1fr_1fr_2.75rem] gap-2";
          row.innerHTML = `
            <div class="flex h-11 items-center border border-black px-3 text-sm font-black">${index + 1}</div>
            <label class="sr-only" for="set-${index}-weight">Set ${index + 1} weight in pounds</label>
            <input
              id="set-${index}-weight"
              inputmode="decimal"
              min="0"
              step="0.5"
              type="number"
              value="${escapeAttribute(set.weight)}"
              class="h-11 min-w-0 border border-black bg-white px-3 text-base font-semibold focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
              data-set-index="${index}"
              data-field="weight"
              placeholder="lbs"
            />
            <label class="sr-only" for="set-${index}-reps">Set ${index + 1} reps</label>
            <input
              id="set-${index}-reps"
              inputmode="numeric"
              min="0"
              step="1"
              type="number"
              value="${escapeAttribute(set.reps)}"
              class="h-11 min-w-0 border border-black bg-white px-3 text-base font-semibold focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
              data-set-index="${index}"
              data-field="reps"
              placeholder="reps"
            />
            <button
              type="button"
              class="flex h-11 items-center justify-center border border-black transition hover:bg-black hover:text-white focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2 ${set.completed ? "bg-black text-white" : "bg-white text-black"}"
              data-set-index="${index}"
              data-field="completed"
              aria-pressed="${set.completed ? "true" : "false"}"
              aria-label="${set.completed ? `Mark set ${index + 1} incomplete` : `Mark set ${index + 1} complete`}"
            >
              <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" aria-hidden="true">
                <path
                  d="M9.25 12.75L11.25 14.75L15.5 9.75"
                  stroke="currentColor"
                  stroke-width="2.25"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <rect x="3.5" y="3.5" width="17" height="17" rx="3" stroke="currentColor" stroke-width="1.75" />
              </svg>
            </button>
          `;
          elements.setRows.append(row);
        });
      }

      function renderViewNavigation() {
        const isStatsView = state.activeView === "stats";
        elements.trackerView.classList.toggle("hidden", isStatsView);
        elements.trackerView.classList.toggle("grid", !isStatsView);
        elements.statsView.classList.toggle("hidden", !isStatsView);
        elements.statsView.classList.toggle("grid", isStatsView);

        elements.trackerViewButton.classList.toggle("bg-black", !isStatsView);
        elements.trackerViewButton.classList.toggle("text-white", !isStatsView);
        elements.statsViewButton.classList.toggle("bg-black", isStatsView);
        elements.statsViewButton.classList.toggle("text-white", isStatsView);
        elements.trackerViewButton.setAttribute("aria-current", isStatsView ? "false" : "page");
        elements.statsViewButton.setAttribute("aria-current", isStatsView ? "page" : "false");
      }

      function makeStatCard(label, value, detail) {
        const card = document.createElement("div");
        card.className = "border border-black p-4";
        card.innerHTML = `
          <p class="text-xs font-black uppercase tracking-[0.18em]">${label}</p>
          <p class="mt-3 text-3xl font-black leading-none">${value}</p>
          <p class="mt-2 min-h-5 text-sm font-semibold">${detail}</p>
        `;
        return card;
      }

      function renderStats() {
        const sessions = getAllLoggedSessions();
        const totalSets = sessions.reduce((total, item) => total + item.completedSets, 0);
        const totalVolume = sessions.reduce((total, item) => total + item.volume, 0);
        const totalWorkoutDays = uniqueWorkoutDateCount(sessions);
        const latestSession = sessions[0];
        const earliestSession = sessions[sessions.length - 1];
        const currentStreak = getCurrentStreak(sessions);

        elements.statsDateRange.textContent =
          earliestSession && latestSession
            ? `${prettyDate(earliestSession.session.workoutDate)} - ${prettyDate(latestSession.session.workoutDate)}`
            : "No completed sets yet";

        elements.statsOverview.innerHTML = "";
        [
          ["Workouts", formatWholeNumber(sessions.length), `${formatWholeNumber(totalWorkoutDays)} logged day${totalWorkoutDays === 1 ? "" : "s"}`],
          ["Sets", formatWholeNumber(totalSets), "Completed sets"],
          ["Volume", `${formatWholeNumber(totalVolume)} lb`, "Weight x reps"],
          ["Streak", `${formatWholeNumber(currentStreak)} day${currentStreak === 1 ? "" : "s"}`, "Through today"],
        ].forEach(([label, value, detail]) => {
          elements.statsOverview.append(makeStatCard(label, value, detail));
        });

        const maxBodyPartSessions = Math.max(
          1,
          ...bodyParts.map((bodyPart) => sessions.filter((item) => item.bodyPartId === bodyPart.id).length)
        );
        elements.bodyPartStats.innerHTML = "";
        bodyParts.forEach((bodyPart) => {
          const bodyPartSessions = sessions.filter((item) => item.bodyPartId === bodyPart.id);
          const bodyPartSets = bodyPartSessions.reduce((total, item) => total + item.completedSets, 0);
          const percent = Math.round((bodyPartSessions.length / maxBodyPartSessions) * 100);
          const row = document.createElement("div");
          row.className = "grid gap-2";
          row.innerHTML = `
            <div class="flex items-center justify-between gap-3 text-sm font-black">
              <span>${bodyPart.name}</span>
              <span>${bodyPartSessions.length} workout${bodyPartSessions.length === 1 ? "" : "s"} · ${bodyPartSets} set${bodyPartSets === 1 ? "" : "s"}</span>
            </div>
            <div class="h-3 border border-black">
              <div class="h-full bg-black" style="width: ${percent}%"></div>
            </div>
          `;
          elements.bodyPartStats.append(row);
        });

        elements.recentActivity.innerHTML = "";
        if (!sessions.length) {
          const empty = document.createElement("div");
          empty.className = "border border-black p-5 text-sm font-bold";
          empty.textContent = "Complete a set to start building your dashboard.";
          elements.recentActivity.append(empty);
          return;
        }

        sessions.slice(0, 8).forEach((item) => {
          const row = document.createElement("button");
          row.type = "button";
          row.className =
            "grid gap-1 border border-black p-3 text-left hover:bg-black hover:text-white focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2";
          row.innerHTML = `
            <span class="flex items-start justify-between gap-3">
              <span class="text-base font-black leading-tight">${item.exerciseName}</span>
              <span class="shrink-0 text-xs font-black uppercase tracking-[0.14em]">${prettyDate(item.session.workoutDate)}</span>
            </span>
            <span class="text-sm font-semibold">${item.bodyPartName} · ${item.completedSets} set${item.completedSets === 1 ? "" : "s"} · ${formatWholeNumber(item.volume)} lb</span>
          `;
          row.addEventListener("click", () => {
            state.activeBodyPart = item.bodyPartId;
            state.activeExerciseId = item.exerciseId;
            setActiveView("tracker");
          });
          elements.recentActivity.append(row);
        });
      }

      function renderSummary() {
        const loggedToday = Object.values(state.entries).filter((entry) => isCompletedToday(entry)).length;
        elements.todaySummary.textContent = `${loggedToday} exercises completed`;
      }

      function render() {
        renderViewNavigation();
        renderBodyParts();
        renderExercises();
        renderTracker();
        renderSummary();
        renderStats();
        renderTimer();
      }

      elements.trackerViewButton.addEventListener("click", () => {
        setActiveView("tracker");
      });

      elements.statsViewButton.addEventListener("click", () => {
        setActiveView("stats");
      });

      elements.setRows.addEventListener("input", (event) => {
        const input = event.target.closest("input[data-set-index]");
        if (!input || !state.activeExerciseId) return;

        const entry = getEntry(state.activeExerciseId);
        const currentSession = getCurrentSession(state.activeExerciseId);
        const setIndex = Number(input.dataset.setIndex);
        const field = input.dataset.field;
        const value = input.value;

        for (let index = setIndex; index < currentSession.sets.length; index += 1) {
          currentSession.sets[index][field] = value;
          const rowInput = elements.setRows.querySelector(
            `input[data-set-index="${index}"][data-field="${field}"]`
          );
          if (rowInput && rowInput !== input) {
            rowInput.value = value;
          }
        }

        currentSession.workoutDate = todayDateString();
        currentSession.updatedAt = new Date().toISOString();
        saveEntries();
        renderSummary();
        renderStats();
        renderBodyParts();
        renderExercises();
        renderPreviousInfo(getPreviousSession(entry));
      });

      elements.setRows.addEventListener("click", (event) => {
        const button = event.target.closest('button[data-set-index][data-field="completed"]');
        if (!button || !state.activeExerciseId) return;

        const entry = getEntry(state.activeExerciseId);
        const currentSession = getCurrentSession(state.activeExerciseId);
        const setIndex = Number(button.dataset.setIndex);
        const set = currentSession.sets[setIndex];
        if (!set) return;

        set.completed = !set.completed;
        currentSession.workoutDate = todayDateString();
        currentSession.updatedAt = new Date().toISOString();
        saveEntries();
        renderSummary();
        renderStats();
        renderBodyParts();
        renderExercises();
        renderTracker();
      });

      elements.clearExercise.addEventListener("click", () => {
        if (!state.activeExerciseId) return;
        delete state.entries[state.activeExerciseId];
        saveEntries();
        render();
      });

      elements.timerToggle.addEventListener("click", () => {
        if (isTimerRunning()) {
          stopTimer();
          return;
        }

        startTimer();
      });

      elements.timerReset.addEventListener("click", () => {
        resetTimer();
      });

      window.addEventListener("popstate", () => {
        restoreSelectionFromUrl();
        render();
      });

      restoreSelectionFromUrl();
      updateUrlSelection();
      render();
    </script>
  </body>
</html>
