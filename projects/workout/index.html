<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "Inter",
                "ui-sans-serif",
                "system-ui",
                "-apple-system",
                "BlinkMacSystemFont",
                "Segoe UI",
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-white text-black antialiased">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col gap-6 px-4 py-5 sm:px-6 lg:px-8">
      <header class="flex flex-col gap-4 border-b border-black pb-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.28em]">Personal log</p>
          <h1 class="mt-2 text-3xl font-black leading-none sm:text-5xl">Workout Tracker</h1>
        </div>
        <div id="todaySummary" class="border border-black px-4 py-3 text-sm font-semibold"></div>
      </header>

      <section class="grid gap-6 lg:grid-cols-[17rem_1fr]">
        <aside class="lg:sticky lg:top-5 lg:self-start">
          <h2 class="mb-3 text-sm font-black uppercase tracking-[0.2em]">Body Part</h2>
          <nav id="bodyPartNav" class="grid grid-cols-2 gap-2 sm:grid-cols-4 lg:grid-cols-1" aria-label="Body parts"></nav>
        </aside>

        <div class="grid gap-6">
          <section>
            <div class="mb-3 flex items-center justify-between gap-3">
              <h2 id="exerciseListTitle" class="text-sm font-black uppercase tracking-[0.2em]">Exercises</h2>
              <span id="exerciseCount" class="text-sm font-semibold"></span>
            </div>
            <div id="exerciseGrid" class="grid gap-3 sm:grid-cols-2"></div>
          </section>

          <section id="trackerPanel" class="border border-black bg-white p-4 sm:p-5">
            <div class="flex items-start justify-between gap-4">
              <div>
                <p id="selectedBodyPart" class="text-xs font-black uppercase tracking-[0.24em]"></p>
                <h2 id="selectedExercise" class="mt-2 text-2xl font-black leading-tight"></h2>
              </div>
              <button
                id="clearExercise"
                type="button"
                class="hidden shrink-0 border border-black px-3 py-2 text-xs font-black uppercase tracking-[0.18em] hover:bg-black hover:text-white focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
              >
                Clear
              </button>
            </div>

            <img id="selectedImage" class="mt-5 aspect-square w-full border border-black object-contain" alt="" />

            <p id="lastWorkedOut" class="mt-5 min-h-5 text-sm font-semibold"></p>

            <form id="setsForm" class="mt-5">
              <div class="grid grid-cols-[3.25rem_1fr_1fr] gap-2 border-b border-black pb-2 text-xs font-black uppercase tracking-[0.16em]">
                <span>Set</span>
                <span>Weight</span>
                <span>Reps</span>
              </div>
              <div id="setRows" class="grid gap-2 pt-3"></div>
            </form>
          </section>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "workout-tracker:v1";
      const bodyParts = [
        {
          id: "back",
          name: "Back",
          exercises: [],
        },
        {
          id: "biceps",
          name: "Biceps",
          exercises: [
            "DUMBBELL-BICEP-CURL.png",
            "DUMBBELL-CROSS-BODY-HAMMER-CURLS.png",
            "DUMBBELL-PREACHER-CURL.png",
            "EZ-BAR-CLOSE-GRIP-CURL.png",
          ],
        },
        {
          id: "chest",
          name: "Chest",
          exercises: [
            "CABLE-STANDING-CHEST-FLY.png",
            "CHEST-PRESS-MACHINE.png",
            "INCLINE-CHEST-PRESS-MACHINE.png",
          ],
        },
        {
          id: "core",
          name: "Core",
          exercises: [
            "AB-CRUNCH-MACHINE.png",
            "BENT-KNEE-LEG-RAISE.png",
            "BICYCLE-CRUNCH.png",
            "CABLE-ROPE-CRUNCH.png",
            "LOW-PLANK.png",
          ],
        },
        {
          id: "hamstrings",
          name: "Hamstrings",
          exercises: [
            "DUMBBELL-GOBLET-SQUAT.png",
            "DUMBBELL-ROMANIAN-DEADLIFT.png",
            "SEATED-HAMSTRING-CURL-MACHINE.png",
          ],
        },
        {
          id: "quads",
          name: "Quads",
          exercises: [
            "SEATED-LEG-EXTENSION-MACHINE.png",
            "SMITH-MACHINE-BULGARIAN-SPLIT-SQUATS.png",
          ],
        },
        {
          id: "shoulders",
          name: "Shoulders",
          exercises: [
            "CABLE-LATERAL-RAISE.png",
            "DUMBBELL-BENT-OVER-REVERSE-FLY.png",
            "DUMBBELL-LATERAL-RAISE.png",
            "PLATE-FRONT-RAISE.png",
            "SHOULDER-PRESS-MACHINE.png",
          ],
        },
        {
          id: "triceps",
          name: "Triceps",
          exercises: ["CABLE-BENT-OVER-TRICEP-EXTENSION.png"],
        },
      ];

      const state = {
        activeBodyPart: bodyParts.find((part) => part.exercises.length)?.id ?? bodyParts[0].id,
        activeExerciseId: null,
        entries: loadEntries(),
      };

      const elements = {
        bodyPartNav: document.querySelector("#bodyPartNav"),
        exerciseListTitle: document.querySelector("#exerciseListTitle"),
        exerciseCount: document.querySelector("#exerciseCount"),
        exerciseGrid: document.querySelector("#exerciseGrid"),
        trackerPanel: document.querySelector("#trackerPanel"),
        selectedBodyPart: document.querySelector("#selectedBodyPart"),
        selectedExercise: document.querySelector("#selectedExercise"),
        selectedImage: document.querySelector("#selectedImage"),
        lastWorkedOut: document.querySelector("#lastWorkedOut"),
        setRows: document.querySelector("#setRows"),
        clearExercise: document.querySelector("#clearExercise"),
        todaySummary: document.querySelector("#todaySummary"),
      };

      function loadEntries() {
        try {
          const stored = window.localStorage.getItem(STORAGE_KEY);
          return stored ? JSON.parse(stored) : {};
        } catch {
          return {};
        }
      }

      function saveEntries() {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
      }

      function formatExerciseName(fileName) {
        return fileName
          .replace(/\.[^.]+$/, "")
          .split("-")
          .map((word) => word.charAt(0) + word.slice(1).toLowerCase())
          .join(" ");
      }

      function getExerciseId(bodyPartId, fileName) {
        return `${bodyPartId}/${fileName.replace(/\.[^.]+$/, "")}`;
      }

      function getExercisePath(bodyPartId, fileName) {
        return `assets/${bodyPartId}/${fileName}`;
      }

      function todayDateString() {
        const now = new Date();
        const offset = now.getTimezoneOffset();
        const localDate = new Date(now.getTime() - offset * 60000);
        return localDate.toISOString().slice(0, 10);
      }

      function prettyDate(dateString) {
        if (!dateString) return "";
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          year: "numeric",
        }).format(new Date(`${dateString}T00:00:00`));
      }

      function hasLoggedData(entry) {
        return Boolean(
          entry?.updatedAt ||
            entry?.sets?.some((set) => String(set.weight || "").length || String(set.reps || "").length)
        );
      }

      function isCompletedToday(entry) {
        return hasLoggedData(entry) && entry.workoutDate === todayDateString();
      }

      function isBodyPartCompletedToday(bodyPart) {
        return bodyPart.exercises.some((fileName) => {
          const entry = state.entries[getExerciseId(bodyPart.id, fileName)];
          return isCompletedToday(entry);
        });
      }

      function escapeAttribute(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll('"', "&quot;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function getEntry(exerciseId) {
        if (!state.entries[exerciseId]) {
          state.entries[exerciseId] = {
            workoutDate: todayDateString(),
            updatedAt: "",
            sets: Array.from({ length: 5 }, () => ({ weight: "", reps: "" })),
          };
        }

        const entry = state.entries[exerciseId];
        while (entry.sets.length < 5) entry.sets.push({ weight: "", reps: "" });
        entry.sets = entry.sets.slice(0, 5);
        entry.workoutDate ||= todayDateString();
        return entry;
      }

      function findActiveExercise() {
        for (const bodyPart of bodyParts) {
          for (const fileName of bodyPart.exercises) {
            const id = getExerciseId(bodyPart.id, fileName);
            if (id === state.activeExerciseId) {
              return {
                id,
                bodyPart,
                fileName,
                name: formatExerciseName(fileName),
                path: getExercisePath(bodyPart.id, fileName),
              };
            }
          }
        }
        return null;
      }

      function renderBodyParts() {
        elements.bodyPartNav.innerHTML = "";

        bodyParts.forEach((bodyPart) => {
          const button = document.createElement("button");
          const isActive = bodyPart.id === state.activeBodyPart;
          const isCompleted = isBodyPartCompletedToday(bodyPart);
          button.type = "button";
          button.className = [
            "flex h-12 items-center justify-between border px-3 text-left text-sm font-black uppercase tracking-[0.14em] focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2",
            isActive
              ? "border-black bg-black text-white"
              : isCompleted
                ? "border-black bg-zinc-200 text-black hover:bg-zinc-300"
                : "border-black bg-white text-black hover:bg-black hover:text-white",
          ].join(" ");
          button.setAttribute("aria-current", isActive ? "true" : "false");
          button.innerHTML = `<span>${bodyPart.name}</span><span>${bodyPart.exercises.length}</span>`;
          button.addEventListener("click", () => {
            state.activeBodyPart = bodyPart.id;
            const firstExercise = bodyPart.exercises[0];
            state.activeExerciseId = firstExercise ? getExerciseId(bodyPart.id, firstExercise) : null;
            render();
          });
          elements.bodyPartNav.append(button);
        });
      }

      function renderExercises() {
        const bodyPart = bodyParts.find((part) => part.id === state.activeBodyPart);
        elements.exerciseListTitle.textContent = bodyPart.name;
        elements.exerciseCount.textContent = `${bodyPart.exercises.length} exercise${bodyPart.exercises.length === 1 ? "" : "s"}`;
        elements.exerciseGrid.innerHTML = "";

        if (!bodyPart.exercises.length) {
          const empty = document.createElement("div");
          empty.className = "border border-black p-6 text-center text-sm font-bold sm:col-span-2";
          empty.textContent = "No exercises yet";
          elements.exerciseGrid.append(empty);
          return;
        }

        bodyPart.exercises.forEach((fileName) => {
          const id = getExerciseId(bodyPart.id, fileName);
          const entry = state.entries[id];
          const button = document.createElement("button");
          const isActive = id === state.activeExerciseId;
          const isCompleted = isCompletedToday(entry);
          button.type = "button";
          button.className = [
            "group grid min-h-36 grid-cols-[6.5rem_minmax(0,1fr)] gap-3 overflow-hidden border p-3 text-left focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2",
            isActive
              ? "border-black bg-black text-white"
              : isCompleted
                ? "border-black bg-zinc-200 text-black hover:bg-zinc-300"
                : "border-black bg-white text-black hover:bg-black hover:text-white",
          ].join(" ");
          button.setAttribute("aria-current", isActive ? "true" : "false");
          button.innerHTML = `
            <img class="aspect-square w-full border border-current bg-white object-contain" src="${getExercisePath(bodyPart.id, fileName)}" alt="" loading="lazy" />
            <span class="flex min-w-0 flex-col justify-between gap-3">
              <span class="break-words text-lg font-black leading-tight">${formatExerciseName(fileName)}</span>
              <span class="text-xs font-bold uppercase tracking-[0.16em]">${hasLoggedData(entry) ? prettyDate(entry.workoutDate) : "Not logged"}</span>
            </span>
          `;
          button.addEventListener("click", () => {
            state.activeExerciseId = id;
            render();
          });
          elements.exerciseGrid.append(button);
        });
      }

      function renderTracker() {
        const activeExercise = findActiveExercise();

        if (!activeExercise) {
          elements.selectedBodyPart.textContent = "No exercise selected";
          elements.selectedExercise.textContent = "Choose an exercise";
          elements.selectedImage.removeAttribute("src");
          elements.selectedImage.alt = "";
          elements.selectedImage.classList.add("hidden");
          elements.lastWorkedOut.textContent = "";
          elements.setRows.innerHTML = "";
          elements.clearExercise.classList.add("hidden");
          return;
        }

        const entry = getEntry(activeExercise.id);
        elements.selectedBodyPart.textContent = activeExercise.bodyPart.name;
        elements.selectedExercise.textContent = activeExercise.name;
        elements.selectedImage.src = activeExercise.path;
        elements.selectedImage.alt = activeExercise.name;
        elements.selectedImage.classList.remove("hidden");
        elements.clearExercise.classList.remove("hidden");

        const today = todayDateString();
        elements.lastWorkedOut.textContent =
          hasLoggedData(entry) && entry.workoutDate && entry.workoutDate < today
            ? `Last worked out ${prettyDate(entry.workoutDate)}`
            : "";

        elements.setRows.innerHTML = "";
        entry.sets.forEach((set, index) => {
          const row = document.createElement("div");
          row.className = "grid grid-cols-[3.25rem_1fr_1fr] gap-2";
          row.innerHTML = `
            <div class="flex h-11 items-center border border-black px-3 text-sm font-black">${index + 1}</div>
            <label class="sr-only" for="set-${index}-weight">Set ${index + 1} weight in pounds</label>
            <input
              id="set-${index}-weight"
              inputmode="decimal"
              min="0"
              step="0.5"
              type="number"
              value="${escapeAttribute(set.weight)}"
              class="h-11 min-w-0 border border-black bg-white px-3 text-base font-semibold focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
              data-set-index="${index}"
              data-field="weight"
              placeholder="lbs"
            />
            <label class="sr-only" for="set-${index}-reps">Set ${index + 1} reps</label>
            <input
              id="set-${index}-reps"
              inputmode="numeric"
              min="0"
              step="1"
              type="number"
              value="${escapeAttribute(set.reps)}"
              class="h-11 min-w-0 border border-black bg-white px-3 text-base font-semibold focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2"
              data-set-index="${index}"
              data-field="reps"
              placeholder="reps"
            />
          `;
          elements.setRows.append(row);
        });
      }

      function renderSummary() {
        const loggedToday = Object.values(state.entries).filter(
          (entry) => isCompletedToday(entry)
        ).length;
        elements.todaySummary.textContent = `${loggedToday} exercises completed`;
      }

      function render() {
        renderBodyParts();
        renderExercises();
        renderTracker();
        renderSummary();
      }

      elements.setRows.addEventListener("input", (event) => {
        const input = event.target.closest("input[data-set-index]");
        if (!input || !state.activeExerciseId) return;

        const entry = getEntry(state.activeExerciseId);
        const setIndex = Number(input.dataset.setIndex);
        const field = input.dataset.field;
        const value = input.value;

        for (let index = setIndex; index < entry.sets.length; index += 1) {
          entry.sets[index][field] = value;
          const rowInput = elements.setRows.querySelector(
            `input[data-set-index="${index}"][data-field="${field}"]`
          );
          if (rowInput && rowInput !== input) {
            rowInput.value = value;
          }
        }

        entry.workoutDate = todayDateString();
        entry.updatedAt = new Date().toISOString();
        saveEntries();
        renderSummary();
        renderBodyParts();
        renderExercises();
        elements.lastWorkedOut.textContent =
          hasLoggedData(entry) && entry.workoutDate < todayDateString()
            ? `Last worked out ${prettyDate(entry.workoutDate)}`
            : "";
      });

      elements.clearExercise.addEventListener("click", () => {
        if (!state.activeExerciseId) return;
        delete state.entries[state.activeExerciseId];
        saveEntries();
        render();
      });

      const initialBodyPart = bodyParts.find((part) => part.id === state.activeBodyPart);
      if (initialBodyPart?.exercises.length) {
        state.activeExerciseId = getExerciseId(initialBodyPart.id, initialBodyPart.exercises[0]);
      }

      render();
    </script>
  </body>
</html>
